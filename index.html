<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="description" content="DEKONme — Le marketplace du Togo. Achetez et vendez de tout : téléphones, mode, électronique, maison, beauté, sport. Contact direct par WhatsApp à Lomé, Kara, Sokodé et partout au Togo.">
  <title>DEKONme — Marketplace du Togo | Acheter et vendre par WhatsApp</title>
  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="topbar">
  <button class="icon-btn" onclick="toggleDropdown()" aria-label="Menu">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <div class="logo"><span class="mark">D</span>EKONme</div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
  <button class="icon-btn" onclick="window.location.href='profil.html'" aria-label="Profil et Notifications">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 00-4-5.7V5a2 2 0 10-4 0v.3A6 6 0 006 11v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
    <span class="badge-dot"></span>
  </button>
</div>

<div class="hero">
  <h1>Achète et vends<br><span class="accent">partout au Togo.</span></h1>
  <p>Mode, électronique, maison, beauté et plus encore.<br>Contact direct par WhatsApp — Lomé, Kara, Sokodé...</p>
  <div class="search-container">
    <div class="search">
      <input id="searchInput" type="text" placeholder="Rechercher un produit..." onkeyup="if(event.key==='Enter') performSearch()" autocomplete="off">
      <button onclick="performSearch()" aria-label="Rechercher">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
    </div>
    <div id="searchDropdown" class="hidden"></div>
  </div>
</div>

<div class="container">
  <div class="section-head">
    <h3>Catégories</h3>
    <span class="see-all" onclick="window.location.href='category.html?view=categories'">Voir tout</span>
  </div>
  <div class="brand-grid" id="brandGrid"></div>

  <div class="section-head">
    <h3 id="productsTitle">Annonces récentes</h3>
    <span class="see-all" onclick="window.location.href='category.html'">Voir tout</span>
  </div>
  <div class="product-grid" id="productGrid"></div>

  <div id="loadMoreWrap" style="text-align:center; padding: 16px 0 32px; display:none;">
    <button class="btn btn-primary" id="loadMoreBtn" onclick="loadMore()">Voir plus d'annonces</button>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>

<div class="dropdown-menu" id="dropdownMenu" onclick="if(event.target===this) toggleDropdown()">
  <div class="dropdown-panel"></div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/lazy-load.js"></script>
<script>
  const PAGE_SIZE = 6;
  let currentOffset = 0;
  let totalListings = 0;

  function renderCategoryGrid() {
    const grid = document.getElementById('brandGrid');
    if (!grid || typeof CATEGORIES === 'undefined') return;
    
    const firstFour = CATEGORIES.slice(0, 4);
    grid.innerHTML = firstFour.map(c => `
      <div class="brand-tile" onclick="window.location.href='category.html?cat=${encodeURIComponent(c.name)}'">
        <div class="icon" style="background:${c.color};">${c.emoji}</div>
        <span>${c.name}</span>
      </div>
    `).join('');
  }

  async function renderHomeProducts() {
    const grid = document.getElementById('productGrid');
    if (!grid) return;
    
    grid.innerHTML = '<p class="loading-text">Chargement des annonces…</p>';

    try {
      // Vérification de l'existence des fonctions globales pour éviter les crashs de script
      if (typeof getAllListings !== 'function' || typeof countAllListings !== 'function') {
        grid.innerHTML = '<p class="loading-text">Erreur de configuration de l\'application.</p>';
        return;
      }

      const [listings, total] = await Promise.all([
        getAllListings(PAGE_SIZE, 0),
        countAllListings()
      ]);

      totalListings = total || 0;
      currentOffset = listings ? listings.length : 0;

      if (listings && listings.length) {
        grid.innerHTML = await renderListingGrid(listings);
        // Initialiser le lazy-loading s'il y a un script dédié
        if (typeof initLazyLoad === 'function') initLazyLoad();
      } else {
        grid.innerHTML = '<p class="loading-text">Aucune annonce pour le moment.</p>';
      }
    } catch (error) {
      console.error("Erreur lors du chargement des annonces :", error);
      grid.innerHTML = '<p class="loading-text" style="color:var(--error);">Impossible de charger les annonces. Vérifiez votre connexion.</p>';
    }

    updateLoadMoreBtn();
  }

  async function loadMore() {
    const btn = document.getElementById('loadMoreBtn');
    const grid = document.getElementById('productGrid');
    if (!btn || !grid) return;

    btn.disabled = true;
    btn.textContent = 'Chargement…';

    try {
      const more = await getAllListings(PAGE_SIZE, currentOffset);
      if (more && more.length) {
        currentOffset += more.length;
        
        // Création d'un conteneur temporaire pour préserver le DOM existant
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = await renderListingGrid(more);
        
        while (tempDiv.firstChild) {
          grid.appendChild(tempDiv.firstChild);
        }
        
        if (typeof initLazyLoad === 'function') initLazyLoad();
      }
    } catch (error) {
      console.error("Erreur de chargement supplémentaire :", error);
    }

    btn.disabled = false;
    btn.textContent = 'Voir plus d\'annonces';
    updateLoadMoreBtn();
  }

  function updateLoadMoreBtn() {
    const wrap = document.getElementById('loadMoreWrap');
    if (!wrap) return;
    wrap.style.display = currentOffset < totalListings ? 'block' : 'none';
  }

  // Fermer le dropdown de recherche si l'utilisateur clique ailleurs sur la page
  document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('searchDropdown');
    const searchContainer = document.querySelector('.search-container');
    if (dropdown && searchContainer && !searchContainer.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });

  // Initialisation au chargement de la page
  document.addEventListener('DOMContentLoaded', () => {
    renderCategoryGrid();
    renderHomeProducts();
    if (typeof renderBottomNav === 'function') {
      renderBottomNav('accueil');
    }
  });
</script>
</body>
</html>
