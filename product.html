<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>DEKONme - Détail produit</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <style>
    /* Styles spécifiques pour l'affichage de la galerie et des actions */
    .product-page-wrapper {
      padding-bottom: 100px; /* Espace pour les actions fixes en bas */
    }
    .detail-gallery-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      border-radius: 16px;
      margin-bottom: 12px;
      background: var(--border);
    }
    .detail-gallery-track::-webkit-scrollbar {
      display: none;
    }
    .detail-gallery-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .detail-gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .gallery-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .gallery-dots .dot, .lightbox-dots .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: var(--transition);
      cursor: pointer;
    }
    .gallery-dots .dot.active, .lightbox-dots .dot.active {
      background: var(--orange);
      transform: scale(1.2);
    }
    .detail-section {
      background: var(--white);
      padding: 16px;
      border-radius: 16px;
      margin-top: 16px;
      border: 1px solid var(--border);
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .pill {
      background: var(--bg);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .pill.tag {
      background: rgba(232, 115, 44, 0.1);
      color: var(--orange);
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='index.html'" aria-label="Retour">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div style="flex:1;"></div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
  <button class="icon-btn" id="shareBtn" onclick="onShareClick()" aria-label="Partager" style="margin-left: 8px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.5" x2="15.4" y2="6.5"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/></svg>
  </button>
  <button class="icon-btn" id="detailFavBtn" onclick="onFavClick()" aria-label="Favori" style="margin-left: 8px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
  </button>
</div>

<!-- CONTAINER PRINCIPAL -->
<div class="container">
  <div id="productContainer" class="product-page-wrapper">
    <p class="loading-text">Chargement des détails de l'annonce…</p>
  </div>
</div>

<!-- VISIONNEUSE PLEIN ÉCRAN -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this) closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fermer">✕</button>
  <div class="lightbox-track" id="lightboxTrack"></div>
  <div class="lightbox-dots" id="lightboxDots"></div>
</div>

<!-- MODAL : SIGNALER UNE ANNONCE -->
<div class="modal" id="reportModal" style="display: none;">
  <div class="modal-content">
    <button class="modal-close" onclick="closeReportModal()" aria-label="Fermer">✕</button>
    <h3>Signaler cette annonce</h3>
    <form id="reportForm" onsubmit="return handleReportSubmit(event)">
      <label class="field-label" for="reportReason">Motif</label>
      <select id="reportReason" required>
        <option value="">Choisir un motif</option>
        <option value="arnaque">Arnaque suspectée</option>
        <option value="telephone_vole">Téléphone volé</option>
        <option value="prix_suspect">Prix suspect</option>
        <option value="annonce_trompeuse">Annonce trompeuse</option>
        <option value="autre">Autre</option>
      </select>

      <label class="field-label" for="reportComment">Détails (facultatif)</label>
      <textarea id="reportComment" rows="3" placeholder="Précisez si besoin..."></textarea>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 16px;">Envoyer le signalement</button>
    </form>
    <p id="reportSuccess" class="success-banner hidden" style="margin-top: 14px;">✅ Signalement envoyé. Merci, notre équipe va l'examiner.</p>
  </div>
</div>

<!-- ACTIONS FIXES DE CONTACT -->
<div class="detail-actions" id="detailActions"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav"></div>

<!-- SCRIPTS -->
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  let id = Number(params.get('id'));
  if (!id) {
    const slug = window.location.pathname.split('/').pop();
    const match = slug.match(/-(\d+)$/);
    if (match) id = Number(match[1]);
  }

  let listing = null;
  let fav = false;
  let lightboxTrack = null;
  let lightboxDots = null;
  let scrollHandler = null;

  function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function validateImageURL(url) {
    if (!url || typeof url !== 'string') return false;
    try {
      const u = new URL(url);
      return u.protocol === 'http:' || u.protocol === 'https:';
    } catch {
      return false;
    }
  }

  function renderFavBtn() {
    const btn = document.getElementById('detailFavBtn');
    if (!btn) return;
    btn.classList.toggle('active', fav);
    const path = btn.querySelector('path');
    if (path) path.setAttribute('fill', fav ? 'currentColor' : 'none');
  }

  window.onFavClick = async function () {
    if (!listing || typeof toggleFavorite !== 'function') return;
    await toggleFavorite(listing.id);
    fav = !fav;
    renderFavBtn();
  };

  window.onShareClick = function () {
    if (!listing || typeof shareListing !== 'function') return;
    shareListing(listing.id, listing.title, listing.price);
  };

  // ====================== RENDER ACTIONS ======================
  function renderActions() {
    const actionsBox = document.getElementById('detailActions');
    if (!actionsBox || !listing) { actionsBox.innerHTML = ''; return; }

    const btn = document.createElement('button');
    btn.className = 'btn btn-whatsapp';
    btn.style.width = '100%';
    btn.style.maxWidth = '300px';
    btn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.6 6.3A8.9 8.9 0 0012 4a8.9 8.9 0 00-7.7 13.4L3 21l3.7-1.3A8.9 8.9 0 0012 21a8.9 8.9 0 006.3-15.3l-.7.6zM12 19.3a7.3 7.3 0 01-3.7-1l-.3-.2-2.7 1 .9-2.6-.2-.3a7.3 7.3 0 1110.6 1.4 7.3 7.3 0 01-4.6 1.7zm4-5.5c-.2-.1-1.3-.6-1.5-.7s-.4-.1-.5.1-.5.7-.6.8-.2.2-.4.1a6 6 0 01-1.7-1 6.6 6.6 0 01-1.2-1.5c-.1-.2 0-.3.1-.4l.3-.4.2-.3v-.3c-.1-.1-.5-1.2-.7-1.7s-.4-.4-.5-.4h-.5c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 2s.9 2.3 1 2.4c.1.2 1.7 2.6 4.2 3.6.6.2 1 .4 1.4.5.6.2 1.1.1 1.5.1.5-.1 1.3-.5 1.5-1s.2-.9.1-1l-.3-.2z"/>
      </svg>
      Contacter sur WhatsApp
    `;
    btn.dataset.whatsapp = listing.whatsapp || '';
    btn.dataset.title = listing.title || '';
    btn.dataset.price = listing.price || 0;
    btn.dataset.id = listing.id || 0;

    actionsBox.innerHTML = '';
    actionsBox.appendChild(btn);

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const whatsapp = btn.dataset.whatsapp.trim();
      if (!whatsapp) return alert('Numéro WhatsApp non défini');
      const title = btn.dataset.title.replace(/'/g, '\\\'');
      const price = Number(btn.dataset.price);
      const productId = Number(btn.dataset.id);
      contactWhatsApp(whatsapp, title, price, productId);
    });
  }

  // ====================== INIT ======================
  async function init() {
    const container = document.getElementById('productContainer');
    if (!container) return;

    if (!id || isNaN(id)) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🔍</div>
          <p>Cette annonce n'existe plus ou a été retirée.</p>
          <div style="margin-top:20px;">
            <button class="btn btn-primary" onclick="window.location.href='index.html'">Retour à l'accueil</button>
          </div>
        </div>
      `;
      return;
    }

    try {
      listing = await getListingById(id);

      if (listing) {
        fav = typeof isFavorite === 'function' ? await isFavorite(listing.id) : false;

        const sellerProfile = typeof getSellerProfile === 'function' ? await getSellerProfile(listing.user_id) : null;
        const currentUser = typeof getCurrentUser === 'function' ? await getCurrentUser() : null;
        const isOwner = currentUser && currentUser.id === listing.user_id;

        const published = params.get('published') === '1';
        const updated = params.get('updated') === '1';

        const ratingLine = listing.reviews > 0 ? `★ ${listing.rating} (${listing.reviews} avis)` : 'Nouvelle annonce';

        // Validation images
        let images = [];
        if (listing.images && Array.isArray(listing.images)) {
          images = listing.images.filter(validateImageURL);
        }
        if (images.length === 0 && listing.image_url && validateImageURL(listing.image_url)) {
          images = [listing.image_url];
        }
        if (images.length === 0) {
          images = [`https://picsum.photos/seed/${listing.id}/600/600`];
        }

        const galleryHTML = `
          <div class="detail-gallery-track" id="galleryTrack">
            ${images.map((url, i) => `
              <div class="detail-gallery-slide" 
                   role="button" 
                   tabindex="0" 
                   onclick="openLightbox(${i})"
                   onkeydown="if(event.key==='Enter'||event.key===' '){openLightbox(${i});}">
                <img src="${escapeHTML(url)}" alt="${escapeHTML(listing.title)} — photo ${i + 1}">
              </div>
            `).join('')}
          </div>
          ${images.length > 1 ? `
            <div class="gallery-dots" id="galleryDots">
              ${images.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}" data-i="${i}"></span>`).join('')}
            </div>
          ` : ''}
        `;

        const ownerActionsHTML = isOwner ? `
          <div class="detail-section owner-actions">
            <button class="btn btn-primary btn-block" onclick="window.location.href='publish.html?id=${listing.id}'">✏️ Modifier l'annonce</button>
          </div>
        ` : `
          <div class="detail-section owner-actions" style="text-align: center;">
            <button class="report-link" onclick="openReportModal()" style="background:none; border:none; color:var(--ink-soft); font-size:13px; cursor:pointer; text-decoration:underline;">🚩 Signaler cette annonce</button>
          </div>
        `;

        const formattedPrice = typeof formatPrice === 'function' ? formatPrice(listing.price) : listing.price;

        container.innerHTML = `
          ${published ? `<div class="success-banner">✅ Votre annonce a été publiée avec succès.</div>` : ''}
          ${updated ? `<div class="success-banner">✅ Votre annonce a été mise à jour.</div>` : ''}
          ${galleryHTML}

          <h1 class="detail-title" style="font-size:22px; margin-top:12px; margin-bottom:4px;">${escapeHTML(listing.title)}</h1>
          <div class="detail-price-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <span class="detail-price" style="font-size:20px; font-weight:800; color:var(--orange); flex:1;">${formattedPrice} FCFA</span>
            <span class="detail-rating" style="font-size:13px; color:var(--ink-soft);">${ratingLine}</span>
          </div>

          <div class="detail-section">
            <h3 style="margin-bottom:8px;">Détails</h3>
            <div class="pill-row">
              <span class="pill">${escapeHTML(listing.model || '')}</span>
              <span class="pill">${escapeHTML(listing.condition || '')}</span>
              <span class="pill tag">📍 ${escapeHTML(listing.city || '')}</span>
            </div>
          </div>

          <div class="detail-section">
            <h3 style="margin-bottom:8px;">Description</h3>
            <p class="detail-desc" style="line-height:1.6; color:var(--ink);">${escapeHTML(listing.description || '').replace(/\n/g, '<br>')}</p>
          </div>

          <div class="detail-section">
            <h3 style="margin-bottom:12px;">Vendeur</h3>
            <div class="seller-card" ${!isOwner ? `onclick="window.location.href='seller.html?id=${listing.user_id}'" style="cursor:pointer; display:flex; align-items:center; gap:12px;"` : 'style="display:flex; align-items:center; gap:12px;"'}>
              <div class="avatar" style="width:44px; height:44px; background:var(--bg); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px;">👤</div>
              <div class="info" style="flex:1;">
                <h5 style="margin:0; font-size:15px;">${escapeHTML(listing.seller_name || 'Vendeur DEKONme')}</h5>
                <p class="seller-status" style="margin:0; font-size:12px; color:var(--ink-soft);">
                  ${(() => {
                    if (typeof getOnlineStatus === 'function') {
                      const s = getOnlineStatus(sellerProfile?.last_seen);
                      return s.dot ? `${s.dot} ${s.label}` : escapeHTML(listing.city || '');
                    }
                    return escapeHTML(listing.city || '');
                  })()}
                </p>
              </div>
              ${!isOwner ? `<span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>` : ''}
            </div>
          </div>

          ${ownerActionsHTML}
        `;

        // Dots galerie
        if (images.length > 1) {
          const track = document.getElementById('galleryTrack');
          const dots = document.getElementById('galleryDots');
          if (track && dots) {
            track.addEventListener('scroll', () => {
              const i = Math.round(track.scrollLeft / track.clientWidth);
              document.querySelectorAll('#galleryDots .dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
            }, { passive: true });

            dots.querySelectorAll('.dot').forEach(dot => {
              dot.addEventListener('click', () => {
                const i = Number(dot.dataset.i);
                track.scrollTo({ left: i * track.clientWidth, behavior: 'smooth' });
              });
            });
          }
        }

        renderFavBtn();
        renderActions();
      } else {
        // Listing non trouvé
        container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🔍</div>
            <p>Cette annonce n'existe plus ou a été retirée.</p>
            <div style="margin-top:20px;">
              <button class="btn btn-primary" onclick="window.location.href='index.html'">Retour à l'accueil</button>
            </div>
          </div>
        `;
      }
    } catch (err) {
      console.error("Erreur d'initialisation du produit :", err);
      container.innerHTML = '<p class="loading-text" style="color:var(--error);">Une erreur est survenue lors du chargement.</p>';
    }

    if (typeof renderBottomNav === 'function') renderBottomNav('categories');
  }

  // ====================== LIGHTBOX ======================
  window.openLightbox = function (startIndex) {
    if (!listing) return;
    const images = listing.images && listing.images.length
      ? listing.images.filter(validateImageURL)
      : (listing.image_url && validateImageURL(listing.image_url)
         ? [listing.image_url]
         : [`https://picsum.photos/seed/${listing.id}/600/600`]);

    if (!lightboxTrack) lightboxTrack = document.getElementById('lightboxTrack');
    if (!lightboxDots) lightboxDots = document.getElementById('lightboxDots');

    lightboxTrack.innerHTML = images.map((url, i) => `
      <div class="lightbox-slide" style="flex:0 0 100%; scroll-snap-align:start; display:flex; align-items:center; justify-content:center;">
        <img src="${escapeHTML(url)}" alt="Photo ${i + 1}" style="max-width:100%; max-height:80vh; object-fit:contain;">
      </div>
    `).join('');

    lightboxDots.innerHTML = images.length > 1
      ? images.map((_, i) => `<span class="dot ${i === startIndex ? 'active' : ''}"></span>`).join('')
      : '';

    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';

    requestAnimationFrame(() => {
      lightboxTrack.scrollTo({ left: startIndex * lightboxTrack.clientWidth });
    });

    // Gestionnaire scroll (on le stocke pour le supprimer proprement)
    scrollHandler = () => {
      const i = Math.round(lightboxTrack.scrollLeft / lightboxTrack.clientWidth);
      lightboxDots.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
    };
    lightboxTrack.addEventListener('scroll', scrollHandler, { passive: true });
  };

  window.closeLightbox = function () {
    const lightbox = document.getElementById('lightbox');
    lightbox.classList.remove('open');
    document.body.style.overflow = '';

    if (lightboxTrack && scrollHandler) {
      lightboxTrack.removeEventListener('scroll', scrollHandler);
      scrollHandler = null;
    }
  };

  // ====================== SIGNALEMENT ======================
  window.openReportModal = function () {
    document.getElementById('reportForm').classList.remove('hidden');
    document.getElementById('reportSuccess').classList.add('hidden');
    document.getElementById('reportModal').style.display = 'flex';
  };

  window.closeReportModal = function () {
    document.getElementById('reportModal').style.display = 'none';
  };

  window.handleReportSubmit = async function (e) {
    e.preventDefault();
    if (!listing || typeof reportListing !== 'function') return false;

    const reason = document.getElementById('reportReason').value;
    const comment = document.getElementById('reportComment').value.trim();

    const submitBtn = document.querySelector('#reportForm button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi…';

    try {
      const { error } = await reportListing(listing.id, reason, comment);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer le signalement';

      if (error) {
        alert('Erreur : ' + error);
        return false;
      }

      document.getElementById('reportForm').classList.add('hidden');
      document.getElementById('reportSuccess').classList.remove('hidden');
      document.getElementById('reportForm').reset();
    } catch (err) {
      console.error("Erreur lors du signalement :", err);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer le signalement';
    }
    return false;
  };

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
