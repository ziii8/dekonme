<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>DEKONme - Détail produit</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='index.html'" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div style="flex:1;"></div>
  <button id="themeToggleBtn" class="icon-btn back-btn" onclick="toggleTheme()" aria-label="Changer de thème" style="font-size:18px; margin-right:8px;">🌙</button>
  <button class="icon-btn back-btn" id="shareBtn" onclick="onShareClick()" aria-label="Partager" style="margin-right:8px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.5" x2="15.4" y2="6.5"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/></svg>
  </button>
  <button class="icon-btn back-btn" id="detailFavBtn" onclick="onFavClick()" aria-label="Favori" style="margin-right:8px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
  </button>
</div>

<div id="productContainer"></div>

<!-- VISIONNEUSE PLEIN ÉCRAN (ouverte au clic sur une photo) -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this) closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fermer">✕</button>
  <div class="lightbox-track" id="lightboxTrack"></div>
  <div class="lightbox-dots" id="lightboxDots"></div>
</div>

<!-- MODAL : SIGNALER UNE ANNONCE -->
<div class="modal" id="reportModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeReportModal()" aria-label="Fermer">✕</button>
    <h3>Signaler cette annonce</h3>
    <form id="reportForm" onsubmit="return handleReportSubmit(event)">
      <label class="field-label">Motif</label>
      <select id="reportReason" required>
        <option value="">Choisir un motif</option>
        <option value="arnaque">Arnaque suspectée</option>
        <option value="telephone_vole">Téléphone volé</option>
        <option value="prix_suspect">Prix suspect</option>
        <option value="annonce_trompeuse">Annonce trompeuse</option>
        <option value="autre">Autre</option>
      </select>

      <label class="field-label">Détails (facultatif)</label>
      <textarea id="reportComment" rows="3" placeholder="Précisez si besoin..."></textarea>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 12px;">Envoyer le signalement</button>
    </form>
    <p id="reportSuccess" class="success-banner hidden" style="margin-top: 14px;">✅ Signalement envoyé. Merci, notre équipe va l'examiner.</p>
  </div>
</div>

<!-- ACTIONS FIXES -->
<div class="detail-actions" id="detailActions"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav"></div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script>
  // Lit l'ID depuis deux formats d'URL possibles :
  // 1. ?id=10 (navigation interne normale)
  // 2. /boyfriend-disponible-10 (lien partagé via WhatsApp, slug propre)
  //    → le nombre à la fin du chemin, après le dernier tiret
  const params = new URLSearchParams(window.location.search);
  let id = Number(params.get('id'));
  if (!id) {
    const slug = window.location.pathname.split('/').pop();
    const match = slug.match(/-(\d+)$/);
    if (match) id = Number(match[1]);
  }
  let listing = null;
  let fav = false;

  function renderFavBtn() {
    document.getElementById('detailFavBtn').classList.toggle('active', fav);
    document.getElementById('detailFavBtn').querySelector('path').setAttribute('fill', fav ? 'currentColor' : 'none');
  }

  window.onFavClick = async function () {
    if (!listing) return;
    await toggleFavorite(listing.id);
    fav = !fav;
    renderFavBtn();
    renderActions();
  };

  window.onShareClick = function () {
    if (!listing) return;
    shareListing(listing.id, listing.title, listing.price);
  };

  function renderActions() {
    if (!listing) { document.getElementById('detailActions').innerHTML = ''; return; }
    document.getElementById('detailActions').innerHTML = `
      <button class="btn btn-outline-fav ${fav ? 'active' : ''}" onclick="onFavClick()" aria-label="Ajouter aux favoris">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${fav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>
      <button class="btn btn-whatsapp" onclick="contactWhatsApp('${listing.whatsapp}', '${listing.title.replace(/'/g, "\\'")}', ${listing.price}, ${listing.id})">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.3A8.9 8.9 0 0012 4a8.9 8.9 0 00-7.7 13.4L3 21l3.7-1.3A8.9 8.9 0 0012 21a8.9 8.9 0 006.3-15.3l-.7.6zM12 19.3a7.3 7.3 0 01-3.7-1l-.3-.2-2.7 1 .9-2.6-.2-.3a7.3 7.3 0 1110.6 1.4 7.3 7.3 0 01-4.6 1.7zm4-5.5c-.2-.1-1.3-.6-1.5-.7s-.4-.1-.5.1-.5.7-.6.8-.2.2-.4.1a6 6 0 01-1.7-1 6.6 6.6 0 01-1.2-1.5c-.1-.2 0-.3.1-.4l.3-.4.2-.3v-.3c-.1-.1-.5-1.2-.7-1.7s-.4-.4-.5-.4h-.5c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 2s.9 2.3 1 2.4c.1.2 1.7 2.6 4.2 3.6.6.2 1 .4 1.4.5.6.2 1.1.1 1.5.1.5-.1 1.3-.5 1.5-1s.2-.9.1-1l-.3-.2z"/></svg>
        Contacter sur WhatsApp
      </button>
    `;
  }

  async function init() {
    document.getElementById('productContainer').innerHTML = '<p class="loading-text">Chargement…</p>';
    listing = await getListingById(id);

    if (listing) {
      fav = await isFavorite(listing.id);
      const sellerProfile = await getSellerProfile(listing.user_id);
      const params = new URLSearchParams(window.location.search);
      const published = params.get('published') === '1';
      const updated = params.get('updated') === '1';
      const ratingLine = listing.reviews > 0
        ? `★ ${listing.rating} (${listing.reviews} avis)`
        : 'Nouvelle annonce';

      const images = listing.images && listing.images.length
        ? listing.images
        : [listing.image_url || 'https://picsum.photos/seed/' + listing.id + '/600/600'];

      const galleryHTML = `
        <div class="detail-gallery-track" id="galleryTrack">
          ${images.map((url, i) => `
            <div class="detail-gallery-slide" onclick="openLightbox(${i})">
              <img src="${url}" alt="${listing.title} — photo ${i + 1}">
            </div>
          `).join('')}
        </div>
        ${images.length > 1 ? `
          <div class="gallery-dots" id="galleryDots">
            ${images.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}" data-i="${i}"></span>`).join('')}
          </div>
        ` : ''}
      `;

      const currentUser = await getCurrentUser();
      const isOwner = currentUser && currentUser.id === listing.user_id;

      const ownerActionsHTML = isOwner ? `
        <div class="detail-section owner-actions">
          <button class="btn btn-primary btn-block" onclick="window.location.href='publish.html?id=${listing.id}'">✏️ Modifier l'annonce</button>
        </div>
      ` : `
        <div class="detail-section owner-actions">
          <button class="report-link" onclick="openReportModal()">🚩 Signaler cette annonce</button>
        </div>
      `;

      document.getElementById('productContainer').innerHTML = `
        ${published ? `<div class="success-banner">✅ Votre annonce a été publiée avec succès.</div>` : ''}
        ${updated ? `<div class="success-banner">✅ Votre annonce a été mise à jour.</div>` : ''}
        ${galleryHTML}

        <h1 class="detail-title">${listing.title}</h1>
        <div class="detail-price-row">
          <span class="detail-price">${formatPrice(listing.price)} FCFA</span>
          <span class="detail-rating">${ratingLine}</span>
        </div>

        <div class="detail-section">
          <h3>Détails</h3>
          <div class="pill-row">
            <span class="pill">${listing.model}</span>
            <span class="pill">${listing.condition}</span>
            <span class="pill tag">📍 ${listing.city}</span>
          </div>
        </div>

        <div class="detail-section">
          <h3>Description</h3>
          <p class="detail-desc">${listing.description}</p>
        </div>

        <div class="detail-section">
          <h3>Vendeur</h3>
          <div class="seller-card" ${!isOwner ? `onclick="window.location.href='seller.html?id=${listing.user_id}'" style="cursor:pointer;"` : ''}>
            <div class="avatar">👤</div>
            <div class="info">
              <h5>${listing.seller_name || 'Vendeur DEKONme'}</h5>
              <p class="seller-status">${(() => {
                const s = getOnlineStatus(sellerProfile && sellerProfile.last_seen);
                return s.dot ? `${s.dot} ${s.label}` : `${listing.city}`;
              })()}</p>
            </div>
            ${!isOwner ? `<span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>` : ''}
          </div>
        </div>

        ${ownerActionsHTML}
      `;

      if (images.length > 1) {
        // Les points suivent le défilement tactile (swipe natif via scroll-snap),
        // pas l'inverse — on observe le scroll plutôt que de gérer le swipe en JS.
        const track = document.getElementById('galleryTrack');
        track.addEventListener('scroll', () => {
          const i = Math.round(track.scrollLeft / track.clientWidth);
          document.querySelectorAll('#galleryDots .dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
        }, { passive: true });

        document.querySelectorAll('#galleryDots .dot').forEach(dot => {
          dot.addEventListener('click', () => {
            const i = Number(dot.dataset.i);
            track.scrollTo({ left: i * track.clientWidth, behavior: 'smooth' });
          });
        });
      }

      renderFavBtn();
      renderActions();
    } else {
      document.getElementById('productContainer').innerHTML = `
        <div class="empty-state">
          <div class="emoji">🔍</div>
          <p>Cette annonce n'existe plus ou a été retirée.</p>
          <div style="margin-top:16px;">
            <button class="btn btn-primary" onclick="window.location.href='index.html'">Retour à l'accueil</button>
          </div>
        </div>
      `;
    }

    renderBottomNav('categories');
  }

  // ==================== VISIONNEUSE PLEIN ÉCRAN (lightbox) ====================
  // Ouverture au clic sur une photo, défilement tactile natif (swipe) via
  // scroll-snap — pas de librairie externe, juste du CSS + un peu de JS.
  window.openLightbox = function (startIndex) {
    if (!listing) return;
    const images = listing.images && listing.images.length
      ? listing.images
      : [listing.image_url || 'https://picsum.photos/seed/' + listing.id + '/600/600'];

    const track = document.getElementById('lightboxTrack');
    const dots = document.getElementById('lightboxDots');

    track.innerHTML = images.map((url, i) => `
      <div class="lightbox-slide"><img src="${url}" alt="Photo ${i + 1}"></div>
    `).join('');

    dots.innerHTML = images.length > 1
      ? images.map((_, i) => `<span class="dot ${i === startIndex ? 'active' : ''}"></span>`).join('')
      : '';

    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';

    requestAnimationFrame(() => {
      track.scrollTo({ left: startIndex * track.clientWidth });
    });

    track.onscroll = () => {
      const i = Math.round(track.scrollLeft / track.clientWidth);
      dots.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
    };
  };

  window.closeLightbox = function () {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  };

  // ==================== SIGNALEMENT D'ANNONCE ====================
  window.openReportModal = function () {
    document.getElementById('reportForm').classList.remove('hidden');
    document.getElementById('reportSuccess').classList.add('hidden');
    document.getElementById('reportModal').style.display = 'flex';
  };

  window.closeReportModal = function () {
    document.getElementById('reportModal').style.display = 'none';
  };

  window.handleReportSubmit = async function (e) {
    e.preventDefault();
    if (!listing) return false;

    const reason = document.getElementById('reportReason').value;
    const comment = document.getElementById('reportComment').value.trim();

    const submitBtn = document.querySelector('#reportForm button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi…';

    const { error } = await reportListing(listing.id, reason, comment);

    submitBtn.disabled = false;
    submitBtn.textContent = 'Envoyer le signalement';

    if (error) {
      alert('Erreur : ' + error);
      return false;
    }

    document.getElementById('reportForm').classList.add('hidden');
    document.getElementById('reportSuccess').classList.remove('hidden');
    document.getElementById('reportForm').reset();
    return false;
  };

  init();
</script>
</body>
</html>
