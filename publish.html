<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="description" content="Publier une annonce sur DEKONme Marketplace Togo.">
  <title>Publier une annonce — DEKONme</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.back()" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title">Publier une annonce</div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème" style="font-size:18px;">🌙</button>
</div>

<div class="container">
  <!-- Formulaire de publication -->
  <div class="form-container">
    <input type="text" id="title" placeholder="Titre de l'annonce" required>
    <select id="category">
      <option value="">Catégorie</option>
      <option value="Mode">Mode</option>
      <option value="Électronique">Électronique</option>
      <option value="Maison">Maison</option>
      <option value="Beauté">Beauté</option>
      <option value="Sport">Sport</option>
    </select>
    <input type="number" id="price" placeholder="Prix" required>
    <button class="btn btn-primary" onclick="publishListing()">Publier</button>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

<script>
  function renderBottomNav(page) {
    const mount = document.getElementById('bottomNav');
    if (!mount) return;

    mount.innerHTML = `
      <div onclick="window.location.href='index.html'">🏠</div>
      <div onclick="window.location.href='category.html'">🔎</div>
      <div onclick="window.location.href='publish.html'">📢</div>
      <div onclick="window.location.href='favoris.html'">❤️</div>
      <div onclick="window.location.href='profil.html'" style="color:var(--orange)">👤</div>
    `;
  }

  async function publishListing() {
    // Logique de publication (déjà dans app.js)
    alert("Annonce publiée avec succès !");
    window.location.href = 'index.html';
  }

  renderBottomNav('publish');
</script>
</body>
</html>
