<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title id="docTitle">DEKONme - Publier une annonce</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <style>
    .publish-container { margin-top: 16px; padding-bottom: 40px; }
    .field-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--ink); margin-top: 16px; }
    #publishForm input[type="text"], #publishForm input[type="number"], #publishForm input[type="tel"], #publishForm select, #publishForm textarea {
      width: 100%; padding: 14px 16px; background: var(--white); border: 2px solid var(--border); border-radius: 12px; font-size: 14px; color: var(--ink); outline: none;
    }
    /* Styles pour les photos, etc. conservés inchangés... */
  </style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='index.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title" id="pageTitle">Publier une annonce</div>
</div>

<div class="container publish-container">
  <form id="publishForm" onsubmit="return handlePublish(event)">
    
    <label class="field-label" for="pTitle">Titre de l'annonce</label>
    <input type="text" id="pTitle" placeholder="Ex : iPhone 13 128 Go..." required>

    <label class="field-label" for="pCategory">Catégorie</label>
    <select id="pCategory" required></select>

    <select id="pBrand" style="display:none;"><option value="Non spécifié" selected>Non spécifié</option></select>

    <label class="field-label" for="pModel">Modèle / Détails</label>
    <input type="text" id="pModel" placeholder="Ex : 128 Go, Couleur rouge..." required>

    <label class="field-label" for="pPrice">Prix (FCFA)</label>
    <input type="number" id="pPrice" placeholder="Ex : 250000" required>

    <label class="field-label" for="pCondition">État</label>
    <select id="pCondition" required>
      <option value="">Choisir un état</option>
      <option value="Neuf">Neuf</option>
      <option value="Occasion propre">Occasion propre</option>
      <option value="Occasion">Occasion</option>
    </select>

    <label class="field-label" for="pCity">Ville</label>
    <select id="pCity" required>
      <option value="">Choisir une ville</option>
      <option value="Lomé">Lomé</option>
      <option value="Kara">Kara</option>
      <option value="Sokodé">Sokodé</option>
    </select>

    <label class="field-label" for="pDescription">Description</label>
    <textarea id="pDescription" rows="4" required></textarea>

    <label class="field-label" for="pWhatsapp">Numéro WhatsApp</label>
    <div class="phone-input-group">
      <span class="phone-prefix">+228</span>
      <input type="tel" id="pWhatsapp" placeholder="90 11 22 33" required>
    </div>

    <label class="field-label" for="pImageFiles">Photos (exactement 2)</label>
    <input type="file" id="pImageFiles" accept="image/*" multiple>
    
    <div id="imagePreviewWrap" class="photo-preview-grid hidden"></div>
    <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top: 24px;">Publier</button>
  </form>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

<script>
  // ... (Gardez vos fonctions init, renderPreviews, compressImage, etc. telles quelles) ...

  async function handlePublish(e) {
    e.preventDefault();
    const totalPhotos = existingImages.length + newFiles.length;
    if (totalPhotos !== 2) { alert('Merci d\'ajouter exactement 2 photos.'); return false; }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;

    let uploadedUrls = [];
    if (newFiles.length > 0 && typeof uploadListingPhotos === 'function') {
      const result = await uploadListingPhotos(newFiles);
      uploadedUrls = result.urls || [];
    }

    const payload = {
      title: document.getElementById('pTitle').value.trim(),
      category: document.getElementById('pCategory').value,
      brand: 'Non spécifié', // Force la valeur par défaut ici
      model: document.getElementById('pModel').value.trim(),
      price: Number(document.getElementById('pPrice').value),
      city: document.getElementById('pCity').value,
      condition: document.getElementById('pCondition').value,
      description: document.getElementById('pDescription').value.trim(),
      whatsapp: document.getElementById('pWhatsapp').value.trim().replace(/\s+/g, ''),
      images: [...existingImages, ...uploadedUrls]
    };

    // ... (votre logique d'envoi reste inchangée) ...
  }
</script>
</body>
</html>
