<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title id="docTitle">DEKONme - Publier une annonce</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <style>
    /* Styles spécifiques pour le formulaire de publication */
    .publish-container {
      margin-top: 16px;
      padding-bottom: 40px;
    }
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--ink);
      margin-top: 16px;
    }
    .field-label:first-of-type {
      margin-top: 0;
    }
    .field-hint {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 6px;
      margin-bottom: 14px;
    }
    #publishForm input[type="text"],
    #publishForm input[type="number"],
    #publishForm input[type="tel"],
    #publishForm select,
    #publishForm textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: var(--transition);
      font-family: inherit;
    }
    #publishForm input:focus,
    #publishForm select:focus,
    #publishForm textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(232, 115, 44, 0.15);
    }
    .phone-input-group {
      display: flex;
      align-items: center;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 12px;
      transition: var(--transition);
    }
    .phone-input-group:focus-within {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(232, 115, 44, 0.15);
    }
    .phone-prefix {
      padding: 0 12px;
      font-weight: 700;
      color: var(--ink-soft);
      border-right: 1px solid var(--border);
    }
    .phone-input-group input {
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
    }
    .photo-preview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .photo-preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .photo-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-preview-item button {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.6);
      color: var(--white);
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-danger {
      background: transparent;
      border: 2px solid var(--error) !important;
      color: var(--error) !important;
    }
    .btn-danger:hover {
      background: var(--error) !important;
      color: var(--white) !important;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='index.html'" aria-label="Retour">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title" id="pageTitle">Publier une annonce</div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
</div>

<!-- LE CONTAINER EMBARQUE LE FORMULAIRE -->
<div class="container publish-container">
  <form id="publishForm" onsubmit="return handlePublish(event)">
    
    <label class="field-label" for="pTitle">Titre de l'annonce</label>
    <input type="text" id="pTitle" placeholder="Ex : iPhone 13 128 Go, Robe élégante taille M..." required>

    <label class="field-label" for="pCategory">Catégorie</label>
    <select id="pCategory" required></select>

    <label class="field-label" for="pModel">Modèle / Détails</label>
    <input type="text" id="pModel" placeholder="Ex : 128 Go, Taille M, Couleur rouge..." required>

    <label class="field-label" for="pPrice">Prix (FCFA)</label>
    <input type="number" id="pPrice" placeholder="Ex : 250000" min="0" required>

    <label class="field-label" for="pCondition">État</label>
    <select id="pCondition" required>
      <option value="">Choisir un état</option>
      <option value="Neuf">Neuf</option>
      <option value="Occasion propre">Occasion propre</option>
      <option value="Occasion">Occasion</option>
    </select>

    <label class="field-label" for="pCity">Ville</label>
    <select id="pCity" required>
      <option value="">Choisir une ville</option>
      <option value="Lomé">Lomé</option>
      <option value="Kara">Kara</option>
      <option value="Sokodé">Sokodé</option>
      <option value="Kpalimé">Kpalimé</option>
      <option value="Atakpamé">Atakpamé</option>
    </select>

    <label class="field-label" for="pDescription">Description</label>
    <textarea id="pDescription" rows="4" placeholder="État, accessoires inclus, raison de la vente..." required></textarea>

    <label class="field-label" for="pWhatsapp">Numéro WhatsApp pour vous contacter</label>
    <div class="phone-input-group">
      <span class="phone-prefix">+228</span>
      <input type="tel" id="pWhatsapp" placeholder="90 11 22 33" pattern="[0-9\s]{8,15}" inputmode="tel" required>
    </div>

    <label class="field-label" for="pImageFiles">Photos (exactement 2)</label>
    <input type="file" id="pImageFiles" accept="image/*" multiple style="display: block; margin-top: 4px;">
    
    <div id="imagePreviewWrap" class="photo-preview-grid hidden"></div>
    <p class="field-hint" id="uploadStatus">Ajoutez exactement 2 photos — elles seront automatiquement optimisées.</p>

    <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top: 24px;">Publier l'annonce</button>
  </form>

  <!-- Conteneur pour le bouton de modification "Marquer comme vendu" -->
  <div id="soldButtonContainer"></div>
</div>

<!-- SCRIPTS -->
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

<script>
  const editId = Number(new URLSearchParams(window.location.search).get('id')) || null;
  let existingImages = [];
  let newFiles = [];

  async function init() {
    if (typeof requireAuth === 'function') {
      if (!(await requireAuth(editId ? `publish.html?id=${editId}` : 'publish.html'))) return;
    }

    const categorySelect = document.getElementById('pCategory');
    if (categorySelect && typeof CATEGORIES !== 'undefined') {
      categorySelect.innerHTML =
        '<option value="">Choisir une catégorie</option>' +
        CATEGORIES.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    }

    if (editId && typeof getListingById === 'function') {
      document.getElementById('docTitle').textContent = "DEKONme - Modifier l'annonce";
      document.getElementById('pageTitle').textContent = "Modifier l'annonce";
      document.getElementById('submitBtn').textContent = 'Enregistrer les modifications';

      try {
        const listing = await getListingById(editId);
        if (!listing) {
          alert("Cette annonce n'existe plus.");
          window.location.href = 'profil.html';
          return;
        }

        document.getElementById('pTitle').value = listing.title || '';
        document.getElementById('pCategory').value = listing.category || '';
        document.getElementById('pModel').value = listing.model || '';
        document.getElementById('pPrice').value = listing.price || 0;
        document.getElementById('pCondition').value = listing.condition || '';
        document.getElementById('pCity').value = listing.city || '';
        document.getElementById('pDescription').value = listing.description || '';
        document.getElementById('pWhatsapp').value = String(listing.whatsapp || '').replace(/\D/g, '').replace(/^228/, '');

        existingImages = listing.images && listing.images.length ? [...listing.images] : (listing.image_url ? [listing.image_url] : []);
        renderPreviews();

        // Ajout propre du bouton "Marquer comme vendu"
        const soldContainer = document.getElementById('soldButtonContainer');
        if (soldContainer) {
          soldContainer.innerHTML = `
            <button type="button" class="btn btn-outline btn-block btn-danger" id="soldBtn" style="margin-top: 16px;">
              📦 Marquer comme vendu
            </button>
          `;
          document.getElementById('soldBtn').addEventListener('click', handleMarkSold);
        }
      } catch (err) {
        console.error("Erreur d'initialisation de l'édition :", err);
      }
    }

    if (typeof renderBottomNav === 'function') renderBottomNav('');
  }

  // ==================== PHOTOS ====================
  function renderPreviews() {
    const wrap = document.getElementById('imagePreviewWrap');
    if (!wrap) return;
    
    const allUrls = [...existingImages, ...newFiles.map(f => URL.createObjectURL(f))];

    if (allUrls.length === 0) {
      wrap.classList.add('hidden');
      wrap.innerHTML = '';
      return;
    }

    wrap.classList.remove('hidden');
    wrap.innerHTML = allUrls.map((url, i) => `
      <div class="photo-preview-item">
        <img src="${url}" alt="Photo ${i + 1}">
        <button type="button" onclick="removePhoto(${i})" aria-label="Retirer cette photo">✕</button>
      </div>
    `).join('');
  }

  window.removePhoto = function (index) {
    if (index < existingImages.length) {
      existingImages.splice(index, 1);
    } else {
      newFiles.splice(index - existingImages.length, 1);
    }
    renderPreviews();
    updateStatusText();
  };

  function updateStatusText() {
    const total = existingImages.length + newFiles.length;
    document.getElementById('uploadStatus').textContent = `${total}/2 photo(s) prête(s)`;
  }

  // ==================== COMPRESSION ====================
  function compressImage(file, maxWidthPx = 1200, qualityJpeg = 0.78) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, maxWidthPx / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => {
          resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
        }, 'image/jpeg', qualityJpeg);
      };
      img.src = url;
    });
  }

  document.getElementById('pImageFiles').addEventListener('change', async (e) => {
    const totalAfter = existingImages.length + newFiles.length + e.target.files.length;
    if (totalAfter > 2) {
      alert('Maximum 2 photos par annonce.');
      e.target.value = '';
      return;
    }
    
    document.getElementById('uploadStatus').textContent = 'Optimisation des photos…';
    try {
      const compressed = await Promise.all(Array.from(e.target.files).map(f => compressImage(f)));
      newFiles.push(...compressed);
    } catch (err) {
      console.error("Compression échouée :", err);
    }
    
    e.target.value = '';
    updateStatusText();
    renderPreviews();
  });

  // ==================== MARQUER COMME VENDU ====================
  async function handleMarkSold() {
    if (!confirm('Confirmer : cet article a été vendu ? Il disparaîtra du site public.')) return;
    if (typeof markAsSold === 'function') {
      const { error } = await markAsSold(editId);
      if (error) { alert('Erreur : ' + error); return; }
      alert('✅ Annonce marquée comme vendue.');
      window.location.href = 'profil.html';
    }
  }

  // ==================== PUBLICATION / MODIFICATION ====================
  async function handlePublish(e) {
    e.preventDefault();
    const totalPhotos = existingImages.length + newFiles.length;
    if (totalPhotos !== 2) {
      alert('Merci d\'ajouter exactement 2 photos.');
      return false;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = editId ? 'Enregistrement…' : 'Publication…';

    let uploadedUrls = [];
    if (newFiles.length > 0 && typeof uploadListingPhotos === 'function') {
      document.getElementById('uploadStatus').textContent = `Envoi de ${newFiles.length} photo(s)…`;
      const result = await uploadListingPhotos(newFiles);
      if (result.error) {
        alert("Erreur lors de l'envoi des photos : " + result.error);
        submitBtn.disabled = false;
        submitBtn.textContent = editId ? 'Enregistrer les modifications' : "Publier l'annonce";
        return false;
      }
      uploadedUrls = result.urls;
    }

    const allImages = [...existingImages, ...uploadedUrls];

    const payload = {
      title: document.getElementById('pTitle').value.trim(),
      category: document.getElementById('pCategory').value,
      price: Number(document.getElementById('pPrice').value),
      city: document.getElementById('pCity').value,
      condition: document.getElementById('pCondition').value,
      model: document.getElementById('pModel').value.trim(),
      images: allImages,
      description: document.getElementById('pDescription').value.trim(),
      whatsapp: document.getElementById('pWhatsapp').value.trim().replace(/\s+/g, '')
    };

    try {
      const { data, error } = editId
        ? await updateListing(editId, payload)
        : await createListing(payload);

      if (error) {
        alert('Erreur : ' + error);
        submitBtn.disabled = false;
        submitBtn.textContent = editId ? 'Enregistrer les modifications' : "Publier l'annonce";
        return false;
      }

      window.location.href = editId
        ? `product.html?id=${editId}&updated=1`
        : `product.html?id=${data.id}&published=1`;
    } catch (err) {
      console.error("Erreur de soumission :", err);
      submitBtn.disabled = false;
      submitBtn.textContent = editId ? 'Enregistrer les modifications' : "Publier l'annonce";
    }
    
    return false;
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
