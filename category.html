<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="description" content="Parcourez toutes les catégories de DEKONme — Mode, Électronique, Maison, Beauté, Sport, Accessoires. Achetez et vendez partout au Togo.">
  <title>Catégories — DEKONme Marketplace Togo</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    .category-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 170px;
      margin-top: 8px;
      box-shadow: var(--shadow-lift);
      z-index: 100;
      max-height: 300px;
      overflow-y: auto;
    }

    .category-dropdown.hidden {
      display: none;
    }

    .category-dropdown-content {
      padding: 6px 0;
    }

    .category-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.15s ease;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-item:hover {
      background-color: var(--bg-soft);
    }

    .category-item.active {
      color: var(--orange);
      font-weight: 700;
      background-color: rgba(232, 115, 44, 0.05);
    }

    .view-wrapper {
      padding-bottom: 40px;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='/index.html'" aria-label="Retour">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title" id="pageTitle">Catégories</div>
  <div style="display:flex; align-items:center; gap:8px;">
    <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
    <button class="icon-btn" onclick="toggleFavListView()" aria-label="Favoris" id="favShortcut">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    </button>
  </div>
</div>

<!-- CONTAINER PRINCIPAL -->
<div class="container view-wrapper">
  <!-- VUE LISTE DES CATÉGORIES -->
  <div id="brandListView" class="hidden">
    <div class="brand-list" id="brandList"></div>
  </div>

  <!-- VUE PRODUITS FILTRÉS ET RECHERCHE -->
  <div id="productListView" class="hidden">
    <div id="sponsorBannerContainer"></div>
    <div class="toolbar" style="margin-bottom: 16px; display: flex; gap: 12px; align-items: center;">
      <div style="position: relative;">
        <button onclick="toggleCategoryFilter()" id="filterBtn" class="btn-filter" style="display: flex; align-items: center; gap: 6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
          Filtrer
        </button>
        <div id="categoryDropdown" class="category-dropdown hidden">
          <div class="category-dropdown-content">
            <!-- Injecté dynamiquement par JavaScript -->
          </div>
        </div>
      </div>
      <button onclick="window.location.href='/category.html'" class="btn-clear-filter" style="background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer;">
        Tous les produits
      </button>
    </div>
    <div class="product-grid" id="productGrid"></div>
    <div id="infiniteScrollSentinel" class="dkm-scroll-sentinel"></div>
    <div id="infiniteSpinner" class="dkm-infinite-spinner" style="display: none;">
      <div class="dot"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav"></div>

<script src="/js/supabase-config.js"></script>
<script src="/js/app.js"></script>
<script src="/js/lazy-load.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');
  const query = params.get('q');
  const view = params.get('view');
  let currentFilter = null;
  let allResults = [];

  /* ============================================================
     FIX AdSense : le script ne doit JAMAIS charger sur une page sans
     contenu réel (chargement en cours, "Aucune annonce trouvée", etc.)
     On l'injecte dynamiquement, uniquement une fois qu'il y a du
     contenu confirmé et affiché à l'écran.
  ============================================================ */
  function loadAdSenseIfContentReady() {
    if (document.getElementById('adsbygoogle-script')) return;
    const script = document.createElement('script');
    script.id = 'adsbygoogle-script';
    script.async = true;
    script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2163275269884844';
    script.crossOrigin = 'anonymous';
    document.head.appendChild(script);
  }

  async function renderCategoryListView() {
    document.getElementById('pageTitle').textContent = 'Catégories';
    document.getElementById('brandListView').classList.remove('hidden');
    document.getElementById('productListView').classList.add('hidden');

    const list = document.getElementById('brandList');
    if (!list) return;
    list.innerHTML = '<p class="loading-text">Chargement des catégories…</p>';

    try {
      if (typeof CATEGORIES === 'undefined') return;
      
      const counts = await Promise.all(CATEGORIES.map(c => {
        return typeof countByCategory === 'function' ? countByCategory(c.name) : Promise.resolve(0);
      }));

      list.innerHTML = CATEGORIES.map((c, i) => `
        <div class="brand-row" onclick="window.location.href='/category.html?cat=${encodeURIComponent(c.name)}'" style="display:flex; align-items:center; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border); cursor:pointer;">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="icon" style="background:${c.color}; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px;">${c.emoji}</div>
            <div class="info">
              <h4 style="margin:0; font-size:15px;">${c.name}</h4>
              <p style="margin:0; font-size:12px; color:var(--ink-soft);">${counts[i]} annonce${counts[i] > 1 ? 's' : ''}</p>
            </div>
          </div>
          <span class="chevron">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </span>
        </div>
      `).join('');

      // FIX AdSense : liste des catégories réellement affichée, contenu éditorial valable
      loadAdSenseIfContentReady();
    } catch (err) {
      console.error("Erreur d'initialisation des catégories :", err);
      list.innerHTML = '<p class="loading-text" style="color:var(--error);">Impossible de récupérer les catégories.</p>';
    }
  }

  function buildCategoryDropdown() {
    const dropdown = document.querySelector('.category-dropdown-content');
    if (!dropdown || typeof CATEGORIES === 'undefined') return;

    const items = [{ name: 'Tous', value: null, emoji: '✓' }];
    CATEGORIES.forEach(c => {
      items.push({ name: c.name, emoji: c.emoji, value: c.name });
    });

    dropdown.innerHTML = items.map(item => {
      const isSelected = currentFilter === item.value;
      return `
        <div class="category-item ${isSelected ? 'active' : ''}" onclick="filterByCategory('${item.value !== null && item.value !== 'null' ? item.value : ''}')">
          <span>${item.emoji || ''}</span> ${item.name}
        </div>
      `;
    }).join('');
  }

  window.toggleCategoryFilter = function () {
    const dropdown = document.getElementById('categoryDropdown');
    if (dropdown) dropdown.classList.toggle('hidden');
  };

  window.filterByCategory = async function (categoryName) {
    currentFilter = (categoryName === '' || categoryName === 'null') ? null : categoryName;
    buildCategoryDropdown();
    
    const dropdown = document.getElementById('categoryDropdown');
    if (dropdown) dropdown.classList.add('hidden');
    
    const grid = document.getElementById('productGrid');
    if (!grid) return;

    const filtered = currentFilter ? allResults.filter(l => l.category === currentFilter) : allResults;

    if (filtered.length > 0) {
      if (typeof renderListingGrid === 'function') {
        grid.innerHTML = await renderListingGrid(filtered);
        if (typeof initLazyLoad === 'function') initLazyLoad();
      }
      // FIX AdSense : résultats filtrés réellement affichés
      loadAdSenseIfContentReady();
    } else {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1; padding:40px 20px;"><div class="emoji">📭</div><p>Aucune annonce ne correspond à ce filtre.</p></div>`;
    }
  };

  async function renderProductListView() {
    document.getElementById('brandListView').classList.add('hidden');
    document.getElementById('productListView').classList.remove('hidden');
    document.getElementById('pageTitle').textContent = cat || (query ? `"${query}"` : 'Résultats');
    const sponsorContainer = document.getElementById('sponsorBannerContainer');
    if (sponsorContainer) sponsorContainer.innerHTML = ''; // Bannière réservée à la vue "tous les produits"

    const grid = document.getElementById('productGrid');
    if (!grid) return;
    grid.innerHTML = typeof renderSkeletonCards === 'function'
      ? renderSkeletonCards(8)
      : '<p class="loading-text">Recherche en cours…</p>';

    try {
      if (cat && typeof getListingsByCategory === 'function') {
        allResults = await getListingsByCategory(cat) || [];
      } else if (typeof searchListings === 'function') {
        allResults = await searchListings(query || '') || [];
      }
      
      buildCategoryDropdown();

      if (allResults.length > 0 && typeof renderListingGrid === 'function') {
        grid.innerHTML = await renderListingGrid(allResults);
        if (typeof initLazyLoad === 'function') initLazyLoad();
        // FIX AdSense : résultats de recherche/catégorie réellement affichés
        loadAdSenseIfContentReady();
      } else {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1; padding:40px 20px;"><div class="emoji">📭</div><p>Aucune annonce trouvée pour votre demande.</p></div>`;
        // Pas de contenu réel => pas de pub sur une page de résultats vide
      }
    } catch (err) {
      console.error("Erreur lors de la récupération des listes :", err);
      grid.innerHTML = '<p class="loading-text" style="color:var(--error);">Une erreur réseau est survenue.</p>';
    }
  }

  const CATALOG_PAGE_SIZE = 12;
  let catalogOffset = 0;
  let catalogTotal  = 0;
  let catalogLoading = false;
  let _catalogInfiniteScrollObserver = null;

  // ============================================
  // BANNIÈRE SPONSOR (pub directe, remplace AdSense)
  // ============================================
  async function renderSponsorBanner() {
    const container = document.getElementById('sponsorBannerContainer');
    if (!container || typeof getActiveSponsor !== 'function') return;

    const sponsor = await getActiveSponsor();
    if (!sponsor) {
      container.innerHTML = '';
      return;
    }

    const safeName = escapeHtml(sponsor.name || '');
    const safeImg = escapeHtml(sponsor.image_url || '');
    const safeLink = escapeHtml(sponsor.link_url || '#');

    container.innerHTML = `
      <a href="${safeLink}" target="_blank" rel="noopener noreferrer sponsored" class="sponsor-banner" aria-label="Publicité : ${safeName}">
        <img src="${safeImg}" alt="${safeName}" loading="lazy">
        <span class="sponsor-tag">Sponsorisé</span>
      </a>
    `;
  }

  async function renderAllProducts() {
    document.getElementById('brandListView').classList.add('hidden');
    document.getElementById('productListView').classList.remove('hidden');
    document.getElementById('pageTitle').textContent = 'Tous les produits';
    renderSponsorBanner();

    const grid = document.getElementById('productGrid');
    if (!grid) return;

    grid.innerHTML = typeof renderSkeletonCards === 'function'
      ? renderSkeletonCards(CATALOG_PAGE_SIZE)
      : '<p class="loading-text">Chargement des articles…</p>';

    catalogOffset = 0;
    allResults = [];

    try {
      const [first, total] = await Promise.all([
        typeof getAllListings === 'function' ? getAllListings(CATALOG_PAGE_SIZE, 0) : Promise.resolve([]),
        typeof countAllListings === 'function' ? countAllListings() : Promise.resolve(0),
      ]);

      allResults = first || [];
      catalogTotal = total || 0;
      catalogOffset = allResults.length;

      buildCategoryDropdown();

      if (allResults.length > 0 && typeof renderListingGrid === 'function') {
        grid.innerHTML = await renderListingGrid(allResults);
        if (typeof initLazyLoad === 'function') initLazyLoad();
        // FIX AdSense : catalogue réellement affiché avec du contenu
        loadAdSenseIfContentReady();
        if (!_catalogInfiniteScrollObserver) setupCatalogInfiniteScroll();
      } else {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1; padding:40px 20px;"><div class="emoji">📭</div><p>Aucune annonce disponible actuellement.</p></div>`;
        // Pas de contenu réel => pas de pub tant que le catalogue est vide
      }
    } catch (err) {
      console.error("Erreur lors de la récupération de tous les produits :", err);
      grid.innerHTML = '<p class="loading-text" style="color:var(--error);">Erreur de chargement du catalogue.</p>';
    }
  }

  async function loadMoreCatalog() {
    if (catalogLoading || typeof getAllListings !== 'function') return;
    catalogLoading = true;
    try {
      const more = await getAllListings(CATALOG_PAGE_SIZE, catalogOffset) || [];
      if (more.length) {
        allResults = allResults.concat(more);
        catalogOffset += more.length;

        const grid = document.getElementById('productGrid');
        if (grid && typeof renderListingGrid === 'function') {
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = await renderListingGrid(more);
          while (tempDiv.firstChild) grid.appendChild(tempDiv.firstChild);
          if (typeof initLazyLoad === 'function') initLazyLoad();
        }
      }
    } catch (err) {
      console.error("Erreur chargement supplémentaire du catalogue :", err);
    } finally {
      catalogLoading = false;
    }
  }

  function setupCatalogInfiniteScroll() {
    if (typeof attachInfiniteScroll !== 'function') return;
    _catalogInfiniteScrollObserver = attachInfiniteScroll({
      sentinelId: 'infiniteScrollSentinel',
      spinnerId: 'infiniteSpinner',
      // On ne charge plus automatiquement si un filtre de catégorie est actif :
      // les nouveaux éléments chargés viennent du catalogue complet, pas du
      // sous-ensemble filtré, ce qui mélangerait les résultats affichés.
      hasMore: () => !currentFilter && catalogOffset < catalogTotal,
      loadMore: loadMoreCatalog,
    });
  }

  window.toggleFavListView = function () {
    window.location.href = '/favoris.html';
  };

  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('categoryDropdown');
    const filterBtn = document.getElementById('filterBtn');
    if (dropdown && !dropdown.contains(e.target) && filterBtn && !filterBtn.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });

  function route() {
    if (view === 'categories') {
      renderCategoryListView();
    } else if (cat || query) {
      renderProductListView();
    } else {
      renderAllProducts();
    }
    if (typeof renderBottomNav === 'function') renderBottomNav('categories');
  }

  document.addEventListener('DOMContentLoaded', route);
</script>
</body>
</html>
