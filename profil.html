<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="description" content="Gérez votre profil, vos annonces et vos favoris sur DEKONme, le marketplace du Togo.">
  <title>Mon profil — DEKONme</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    .profile-page-wrapper { margin-top: 16px; padding-bottom: 40px; }
    .btn-danger { background: transparent; border: 2px solid var(--error) !important; color: var(--error) !important; }
    .btn-danger:hover { background: var(--error) !important; color: var(--white) !important; box-shadow: 0 4px 16px rgba(192, 57, 43, 0.2); }
    .profile-header { animation: fadeIn 0.4s ease-out; }
    .profile-stats-bar { display: flex; justify-content: space-around; background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-top: 16px; text-align: center; box-shadow: var(--shadow); }
    .stat-item { display: flex; flex-direction: column; flex: 1; }
    .stat-item:not(:last-child) { border-right: 1px solid var(--border); }
    .stat-item strong { font-size: 18px; color: var(--orange); }
    .stat-item span { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
    .profile-actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
    .action-cat-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 12px 6px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; width: 100%; }
    .action-cat-card:active { transform: scale(0.95); }
    .action-cat-icon { width: 42px; height: 42px; background: rgba(232, 115, 44, 0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .action-cat-label { font-size: 11px; font-weight: 600; line-height: 1.2; color: var(--ink); }
    .edit-profile-wrapper { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; animation: fadeIn 0.3s ease-out; }
    .edit-form-group { margin-bottom: 14px; }
    .edit-form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
    #toast { position: fixed; bottom: calc(var(--nav-height) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--bg); padding: 10px 20px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 600; z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='index.html'" aria-label="Retour">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title">Mon profil</div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
</div>

<div class="container">
  <div id="profileContainer" class="profile-page-wrapper">
    <p class="loading-text">Vérification de la session…</p>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>
<div id="toast" role="status" aria-live="polite"></div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/lazy-load.js"></script>
<script>
  let allActiveListings = [];
  let allSoldListings   = [];
  let visibleActiveCount = 2;
  let visibleSoldCount   = 2;

  function escapeHTML(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,  '&amp;').replace(/</g,  '&lt;').replace(/>/g,  '&gt;').replace(/"/g,  '&quot;').replace(/'/g,  '&#39;');
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  function renderLoggedOut() {
    document.getElementById('profileContainer').innerHTML = `
      <div class="empty-state" style="padding-top: 40px;">
        <div class="emoji">👤</div>
        <p>Connectez-vous pour accéder à votre profil.</p>
        <button class="btn btn-primary btn-block" onclick="window.location.href='auth.html?next=profil.html'">Se connecter</button>
      </div>
    `;
    if (typeof renderBottomNav === 'function') renderBottomNav('profil');
  }

  async function renderLoggedIn(profile) {
    const cleanPhone = profile.phone ? profile.phone.replace('+228', '') : '';
    try {
      if (typeof getMyListings === 'function') {
        const myListings = await getMyListings() || [];
        allActiveListings = myListings.filter(l => l.status !== 'sold');
        allSoldListings   = myListings.filter(l => l.status === 'sold');
      }
    } catch (e) { console.error('Erreur stats :', e); }

    const safeName  = escapeHTML(profile.name);
    const safeCity  = escapeHTML(profile.city  || '');
    const safePhone = escapeHTML(profile.phone || '');
    const safeId    = escapeHTML(profile.id);

    document.getElementById('profileContainer').innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${escapeHTML(profile.avatar_emoji || '👤')}</div>
        <div class="info">
          <h2>${safeName}</h2>
          <p>${safeCity ? safeCity + ' · ' : ''}${safePhone}</p>
        </div>
      </div>

      <div class="profile-stats-bar">
        <div class="stat-item"><strong>${allActiveListings.length}</strong><span>En cours</span></div>
        <div class="stat-item"><strong>${allSoldListings.length}</strong><span>Vendues</span></div>
      </div>

      <div class="profile-actions-grid">
        <button type="button" class="action-cat-card" id="btnToggleEdit" aria-label="Modifier mes informations">
          <div class="action-cat-icon">📝</div>
          <span class="action-cat-label">Modifier<br>Infos</span>
        </button>
        <button type="button" class="action-cat-card" id="btnShareShop" data-id="${safeId}" data-name="${safeName}" aria-label="Partager ma boutique">
          <div class="action-cat-icon">🔗</div>
          <span class="action-cat-label">Partager<br>Boutique</span>
        </button>
        <button type="button" class="action-cat-card" onclick="window.location.href='favoris.html'" aria-label="Mes favoris">
          <div class="action-cat-icon">❤️</div>
          <span class="action-cat-label">Mes<br>Favoris</span>
        </button>
        <button type="button" class="action-cat-card" onclick="window.open('https://wa.me/22899129916', '_blank')" aria-label="Contacter le support">
          <div class="action-cat-icon">💬</div>
          <span class="action-cat-label">Besoin<br>d'aide ?</span>
        </button>
      </div>

      <div id="editProfileWrapper" class="edit-profile-wrapper" style="display: none;" aria-hidden="true">
        <form id="editProfileForm">
          <div class="edit-form-group">
            <label for="editName">Nom complet / Nom de boutique</label>
            <input type="text" id="editName" value="${safeName}" required>
          </div>
          <div class="edit-form-group">
            <label for="editPhone">Numéro WhatsApp (sans +228)</label>
            <input type="tel" id="editPhone" value="${escapeHTML(cleanPhone)}" required pattern="[0-9]{8}" maxlength="8">
          </div>
          <button type="submit" id="btnSaveProfile" class="btn btn-primary btn-block">Enregistrer</button>
        </form>
      </div>

      <div class="section-head" style="margin-top: 24px;"><h3>Mes annonces actives</h3></div>
      <div class="product-grid" id="myListingsGrid"></div>
      <div id="activeMoreContainer" class="load-more-container"></div>
      <button class="btn btn-outline btn-block btn-danger" id="btnLogout" style="margin-top: 40px;">Déconnexion</button>
    `;

    document.getElementById('btnToggleEdit').addEventListener('click', () => {
      const w = document.getElementById('editProfileWrapper');
      w.style.display = w.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('editProfileForm').addEventListener('submit', handleProfileUpdate);
    document.getElementById('btnLogout').addEventListener('click', handleLogout);
    
    renderActiveGrid();
    if (typeof renderBottomNav === 'function') renderBottomNav('profil');
  }

  // --- Fonctions utilitaires gardées du code initial ---
  async function handleProfileUpdate(e) {
    e.preventDefault();
    const name = document.getElementById('editName').value;
    const phone = '+228' + document.getElementById('editPhone').value;
    const { data: { user } } = await window.db.auth.getUser();
    await window.db.from('profiles').update({ name, phone }).eq('id', user.id);
    showToast('Profil mis à jour !');
    location.reload();
  }

  async function handleLogout() { if(typeof logoutUser === 'function') await logoutUser(); window.location.href='index.html'; }
  async function renderActiveGrid() { /* ... votre logique de grille ... */ }

  async function init() {
    if (typeof getMyProfile === 'function') {
      const profile = await getMyProfile();
      profile ? renderLoggedIn(profile) : renderLoggedOut();
    }
  }
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
