<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="description" content="Gérez votre profil, vos annonces et vos favoris sur DEKONme, le marketplace du Togo.">
  <title>Mon profil — DEKONme</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- FIX Perf : Supabase chargé une seule fois ici, pas dans supabase-config.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    /* Ajustements locaux complémentaires pour le profil */
    .profile-page-wrapper {
      margin-top: 16px;
      padding-bottom: 40px;
    }

    .btn-danger {
      background: transparent;
      border: 2px solid var(--error) !important;
      color: var(--error) !important;
    }
    .btn-danger:hover {
      background: var(--error) !important;
      color: var(--white) !important;
      box-shadow: 0 4px 16px rgba(192, 57, 43, 0.2);
    }

    .profile-header {
      animation: fadeIn 0.4s ease-out;
    }

    /* --- TABLEAU DE BORD & STATISTIQUES --- */
    .profile-stats-bar {
      display: flex;
      justify-content: space-around;
      /* FIX CSS : --bg-card remplacé par var(--white), --primary par var(--orange) */
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 16px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .stat-item:not(:last-child) {
      border-right: 1px solid var(--border);
    }
    .stat-item strong {
      font-size: 18px;
      /* FIX CSS : --primary → var(--orange) */
      color: var(--orange);
    }
    .stat-item span {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    /* --- GRILLE DES ACTIONS (2 colonnes pour 5 éléments équilibrés) --- */
    /* FIX UX : repeat(3,1fr) → repeat(2,1fr) pour éviter la 5e carte orpheline */
    .profile-actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    /* FIX A11y : .action-cat-card est maintenant un <button> — reset styles natifs */
    .action-cat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
      width: 100%;
    }
    .action-cat-card:active {
      transform: scale(0.95);
    }
    .action-cat-card:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 2px;
    }
    .action-cat-icon {
      width: 42px;
      height: 42px;
      background: rgba(232, 115, 44, 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .action-cat-label {
      font-size: 11px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
    }

    /* Style pour les volets dépliants */
    .edit-profile-wrapper {
      /* FIX CSS : --bg-card remplacé par var(--bg-soft) */
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease-out;
    }
    .edit-form-group {
      margin-bottom: 14px;
    }
    .edit-form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
    }
    /*
      FIX CSS : Les surcharges locales input/select sont supprimées.
      Les champs héritent directement du design system global (style.css).
    */

    /* Grille de sélection d'émojis */
    .emoji-choices-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 4px 0;
    }
    /* FIX A11y : emoji-choice-btn est maintenant un <button> */
    .emoji-choice-btn {
      font-size: 24px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      text-align: center;
      transition: background 0.2s;
      background: none;
      border: none;
      font-family: inherit;
    }
    .emoji-choice-btn:active,
    .emoji-choice-btn:hover {
      background: rgba(232, 115, 44, 0.15);
    }
    .emoji-choice-btn:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 2px;
    }

    /* Boutons Voir Plus */
    .load-more-container {
      text-align: center;
      margin-top: 14px;
      margin-bottom: 8px;
    }
    .btn-sm {
      padding: 8px 24px !important;
      font-size: 13px !important;
      width: auto !important;
      display: inline-flex !important;
    }

    /* FIX UX : Toast de notification (remplace les alert() bloquants) */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-height) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 600;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='index.html'" aria-label="Retour">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title">Mon profil</div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
</div>

<div class="container">
  <div id="profileContainer" class="profile-page-wrapper">
    <p class="loading-text">Vérification de la session…</p>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>

<!-- FIX UX : Toast global — remplace tous les alert() -->
<div id="toast" role="status" aria-live="polite"></div>

<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/lazy-load.js"></script>
<script>
  let allActiveListings = [];
  let allSoldListings   = [];
  let visibleActiveCount = 2;
  let visibleSoldCount   = 2;

  /* ============================================================
     FIX XSS : Fonction d'échappement HTML — à appliquer sur
     toute donnée issue de Supabase avant injection dans innerHTML.
  ============================================================ */
  function escapeHTML(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#39;');
  }

  /* ============================================================
     FIX UX : Toast — remplace alert() sur mobile
  ============================================================ */
  let _toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ============================================================
     Rendu état déconnecté
  ============================================================ */
  function renderLoggedOut() {
    document.getElementById('profileContainer').innerHTML = `
      <div class="empty-state" style="padding-top: 40px;">
        <div class="emoji">👤</div>
        <p>Connectez-vous pour accéder à votre profil, vos annonces et vos favoris.</p>
        <div style="margin-top:24px; display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px; margin-left:auto; margin-right:auto;">
          <button class="btn btn-primary btn-block" onclick="window.location.href='auth.html?next=profil.html'">Se connecter</button>
        </div>
      </div>
    `;
    if (typeof renderBottomNav === 'function') renderBottomNav('profil');
  }

  /* ============================================================
     Rendu état connecté
  ============================================================ */
  async function renderLoggedIn(profile) {
    const cleanPhone = profile.phone ? profile.phone.replace('+228', '') : '';

    try {
      if (typeof getMyListings === 'function') {
        const myListings = await getMyListings() || [];
        allActiveListings = myListings.filter(l => l.status !== 'sold');
        allSoldListings   = myListings.filter(l => l.status === 'sold');
      }
    } catch (e) {
      console.error('Erreur stats :', e);
    }

    /* FIX XSS : toutes les valeurs profil échappées avec escapeHTML() */
    const safeName  = escapeHTML(profile.name);
    const safeCity  = escapeHTML(profile.city  || '');
    const safePhone = escapeHTML(profile.phone || '');
    const safeAvatar = escapeHTML(profile.avatar_emoji || '👤');
    const safeCleanPhone = escapeHTML(cleanPhone);
    /* FIX XSS : id et name stockés en data-attributes, pas dans onclick inline */
    const safeId = escapeHTML(profile.id);

    document.getElementById('profileContainer').innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${safeAvatar}</div>
        <div class="info">
          <h2>${safeName}</h2>
          <p>${safeCity ? safeCity + ' · ' : ''}${safePhone}</p>
        </div>
      </div>

      <div class="profile-stats-bar">
        <div class="stat-item">
          <strong>${allActiveListings.length}</strong>
          <span>En cours</span>
        </div>
        <div class="stat-item">
          <strong>${allSoldListings.length}</strong>
          <span>Vendues</span>
        </div>
      </div>

      <!-- FIX A11y : <div onclick> → <button type="button"> avec aria-label -->
      <!-- FIX XSS : profile.id/name dans data-* au lieu de onclick inline    -->
      <div class="profile-actions-grid">
        <button type="button" class="action-cat-card" id="btnToggleEdit" aria-label="Modifier mes informations">
          <div class="action-cat-icon">📝</div>
          <span class="action-cat-label">Modifier<br>Infos</span>
        </button>
        <button type="button" class="action-cat-card" id="btnToggleEmoji" aria-label="Changer mon emoji d'avatar">
          <div class="action-cat-icon">🎭</div>
          <span class="action-cat-label">Changer<br>Emoji</span>
        </button>
        <button type="button" class="action-cat-card" id="btnShareShop"
                data-id="${safeId}" data-name="${safeName}" aria-label="Partager ma boutique">
          <div class="action-cat-icon">🔗</div>
          <span class="action-cat-label">Partager<br>Boutique</span>
        </button>
        <button type="button" class="action-cat-card" onclick="window.location.href='favoris.html'" aria-label="Mes favoris">
          <div class="action-cat-icon">❤️</div>
          <span class="action-cat-label">Mes<br>Favoris</span>
        </button>
        <button type="button" class="action-cat-card" onclick="window.open('https://wa.me/22899129916', '_blank')" aria-label="Contacter le support">
          <div class="action-cat-icon">💬</div>
          <span class="action-cat-label">Besoin<br>d'aide ?</span>
        </button>
      </div>

      <!-- PANEL EMOJI -->
      <div id="emojiPickerWrapper" class="edit-profile-wrapper" style="display: none;" aria-hidden="true">
        <p style="font-size: 13px; font-weight: 600; margin-bottom: 12px; text-align:center;">Choisissez le badge de votre boutique :</p>
        <div class="emoji-choices-grid">
          ${['👤','👑','🛍️','👕','👠','📱','🎮','💄','⚡','✨','🔥','💼'].map(emo =>
            /* FIX A11y : <span onclick> → <button type="button"> */
            `<button type="button" class="emoji-choice-btn" data-emoji="${escapeHTML(emo)}" aria-label="Choisir ${emo}">${emo}</button>`
          ).join('')}
        </div>
      </div>

      <!-- PANEL FORMULAIRE EDITION -->
      <div id="editProfileWrapper" class="edit-profile-wrapper" style="display: none;" aria-hidden="true">
        <!-- FIX : addEventListener ajouté après injection, pas onsubmit inline -->
        <form id="editProfileForm">
          <div class="edit-form-group">
            <label for="editName">Nom complet / Nom de boutique</label>
            <input type="text" id="editName" value="${safeName}" required autocomplete="name">
          </div>
          <div class="edit-form-group">
            <label for="editPhone">Numéro WhatsApp (sans +228)</label>
            <!-- FIX UX : pattern + maxlength pour validation format togolais -->
            <input type="tel" id="editPhone" value="${safeCleanPhone}" required
                   placeholder="Ex: 90123456" pattern="[0-9]{8}" maxlength="8"
                   inputmode="numeric" autocomplete="tel-national">
          </div>
          <div class="edit-form-group">
            <label for="editCity">Ville</label>
            <select id="editCity">
              ${['Lomé','Kara','Sokodé','Kpalimé','Atakpamé','Dapaong','Tsévié','Aného'].map(city =>
                `<option value="${escapeHTML(city)}" ${profile.city === city ? 'selected' : ''}>${escapeHTML(city)}</option>`
              ).join('')}
            </select>
          </div>
          <button type="submit" id="btnSaveProfile" class="btn btn-primary btn-block">
            Enregistrer les modifications
          </button>
        </form>
      </div>

      <div class="section-head" style="margin-top: 24px;">
        <h3>Mes annonces actives</h3>
      </div>
      <div class="product-grid" id="myListingsGrid"></div>
      <div id="activeMoreContainer" class="load-more-container"></div>

      <div class="section-head" style="margin-top: 32px;" id="soldSectionHead"></div>
      <div class="product-grid" id="mySoldGrid"></div>
      <div id="soldMoreContainer" class="load-more-container"></div>

      <button class="btn btn-outline btn-block btn-danger" id="btnLogout" style="margin-top: 40px;">
        Déconnexion
      </button>
    `;

    /* ---- Attachement des écouteurs après injection (pas d'onclick inline) ---- */

    document.getElementById('btnToggleEdit').addEventListener('click', toggleEditForm);
    document.getElementById('btnToggleEmoji').addEventListener('click', toggleEmojiPicker);

    /* FIX XSS : lecture via dataset, pas via inline onclick */
    const btnShare = document.getElementById('btnShareShop');
    if (btnShare) {
      btnShare.addEventListener('click', () => {
        shareMyShop(btnShare.dataset.id, btnShare.dataset.name);
      });
    }

    /* FIX : addEventListener sur le form (pas onsubmit="...") */
    const form = document.getElementById('editProfileForm');
    if (form) form.addEventListener('submit', handleProfileUpdate);

    /* Émojis */
    document.querySelectorAll('.emoji-choice-btn').forEach(btn => {
      btn.addEventListener('click', () => updateAvatarEmoji(btn.dataset.emoji));
    });

    /* Déconnexion */
    const btnLogout = document.getElementById('btnLogout');
    if (btnLogout) btnLogout.addEventListener('click', handleLogout);

    renderActiveGrid();
    renderSoldGrid();

    if (typeof renderBottomNav === 'function') renderBottomNav('profil');
  }

  /* ============================================================
     Génération HTML d'une carte annonce
  ============================================================ */
  function myListingCardHTML(l, editable) {
    /* FIX XSS : toutes les données annonce échappées */
    const image = escapeHTML((l.images && l.images[0]) || l.image_url || 'https://picsum.photos/seed/' + encodeURIComponent(l.id) + '/600/600');
    const target = editable ? `publish.html?id=${encodeURIComponent(l.id)}` : `product.html?id=${encodeURIComponent(l.id)}`;
    const formattedPrice = typeof formatPrice === 'function' ? formatPrice(l.price) : l.price;
    const safeTitle = escapeHTML(l.title);
    const safeCity  = escapeHTML(l.city  || '');
    const safeCond  = escapeHTML(l.condition || '');

    return `
      <div class="product-card" onclick="window.location.href='${escapeHTML(target)}'">
        <div class="img-wrap">
          <img data-src="${image}"
               src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E"
               alt="${safeTitle}" class="lazy">
          ${!editable ? '<span class="sold-badge">VENDU</span>' : ''}
        </div>
        <div class="product-info">
          <h4>${safeTitle}</h4>
          <div class="price-row"><span class="price">${escapeHTML(String(formattedPrice))} F</span></div>
          <p class="meta">${safeCity}${safeCity && safeCond ? ' · ' : ''}${safeCond}</p>
        </div>
      </div>
    `;
  }

  /* ============================================================
     Grilles paginées
  ============================================================ */
  function renderActiveGrid() {
    const grid = document.getElementById('myListingsGrid');
    const btnContainer = document.getElementById('activeMoreContainer');
    if (!grid) return;

    const visibleListings = allActiveListings.slice(0, visibleActiveCount);
    grid.innerHTML = allActiveListings.length
      ? visibleListings.map(l => myListingCardHTML(l, true)).join('')
      : `<div class="empty-state" style="grid-column:1/-1; padding: 30px 20px;"><div class="emoji">📭</div><p>Vous n'avez aucune annonce active.</p></div>`;

    btnContainer.innerHTML = allActiveListings.length > visibleActiveCount
      ? `<button class="btn btn-outline btn-sm" id="btnMoreActive">Voir plus</button>`
      : '';

    if (allActiveListings.length > visibleActiveCount) {
      document.getElementById('btnMoreActive').addEventListener('click', loadMoreActive);
    }

    if (typeof initLazyLoad === 'function') initLazyLoad();
  }

  function loadMoreActive() {
    visibleActiveCount += 2;
    renderActiveGrid();
  }

  function renderSoldGrid() {
    const soldHead = document.getElementById('soldSectionHead');
    const grid = document.getElementById('mySoldGrid');
    const btnContainer = document.getElementById('soldMoreContainer');
    if (!grid) return;

    if (allSoldListings.length) {
      if (soldHead) soldHead.innerHTML = '<h3>Annonces vendues</h3>';
      const visibleListings = allSoldListings.slice(0, visibleSoldCount);
      grid.innerHTML = visibleListings.map(l => myListingCardHTML(l, false)).join('');

      btnContainer.innerHTML = allSoldListings.length > visibleSoldCount
        ? `<button class="btn btn-outline btn-sm" id="btnMoreSold">Voir plus</button>`
        : '';

      if (allSoldListings.length > visibleSoldCount) {
        document.getElementById('btnMoreSold').addEventListener('click', loadMoreSold);
      }
    } else {
      if (soldHead) soldHead.innerHTML = '';
      grid.innerHTML = '';
      btnContainer.innerHTML = '';
    }

    if (typeof initLazyLoad === 'function') initLazyLoad();
  }

  function loadMoreSold() {
    visibleSoldCount += 2;
    renderSoldGrid();
  }

  /* ============================================================
     Volets dépliants
  ============================================================ */
  function toggleEditForm() {
    const wrapper = document.getElementById('editProfileWrapper');
    const picker  = document.getElementById('emojiPickerWrapper');
    if (picker) { picker.style.display = 'none'; picker.setAttribute('aria-hidden', 'true'); }
    if (!wrapper) return;
    const open = wrapper.style.display === 'none';
    wrapper.style.display = open ? 'block' : 'none';
    wrapper.setAttribute('aria-hidden', String(!open));
  }

  function toggleEmojiPicker() {
    const wrapper  = document.getElementById('emojiPickerWrapper');
    const editForm = document.getElementById('editProfileWrapper');
    if (editForm) { editForm.style.display = 'none'; editForm.setAttribute('aria-hidden', 'true'); }
    if (!wrapper) return;
    const open = wrapper.style.display === 'none';
    wrapper.style.display = open ? 'block' : 'none';
    wrapper.setAttribute('aria-hidden', String(!open));
  }

  /* ============================================================
     Mise à jour emoji
     FIX Perf : mise à jour ciblée de l'avatar sans re-render complet
  ============================================================ */
  async function updateAvatarEmoji(emoji) {
    if (!window.db) return;
    try {
      const { data: { user } } = await window.db.auth.getUser();
      if (!user) return;

      const { error } = await window.db
        .from('profiles')
        .update({ avatar_emoji: emoji })
        .eq('id', user.id);

      if (error) throw error;

      /* FIX Perf : on met à jour seulement l'avatar affiché sans rappeler init() */
      const avatarEl = document.querySelector('.profile-avatar');
      if (avatarEl) avatarEl.textContent = emoji;

      const picker = document.getElementById('emojiPickerWrapper');
      if (picker) { picker.style.display = 'none'; picker.setAttribute('aria-hidden', 'true'); }

      /* FIX UX : toast à la place de alert() */
      showToast('Avatar mis à jour ! ' + emoji);
    } catch (err) {
      console.error(err);
      showToast("Impossible de changer l'émoji.");
    }
  }

  /* ============================================================
     Partage boutique
  ============================================================ */
  async function shareMyShop(id, name) {
    const shopUrl   = `${window.location.origin}/vendeur.html?id=${encodeURIComponent(id)}`;
    const shareText = `Découvrez ma vitrine "${name}" sur DEKONme ! Retrouvez tous mes articles disponibles ici :`;

    if (navigator.share) {
      try {
        await navigator.share({ title: name, text: shareText, url: shopUrl });
      } catch (err) {
        /* Annulation silencieuse (l'utilisateur a fermé le panneau) */
        if (err.name !== 'AbortError') console.error(err);
      }
    } else {
      try {
        await navigator.clipboard.writeText(`${shareText} ${shopUrl}`);
        /* FIX UX : toast à la place de alert() */
        showToast('Lien copié ! Collez-le dans votre statut WhatsApp 📋');
      } catch (err) {
        showToast('Votre lien : ' + shopUrl);
      }
    }
  }

  /* ============================================================
     Mise à jour profil
     FIX Perf : mise à jour ciblée des éléments modifiés sans re-render complet
  ============================================================ */
  async function handleProfileUpdate(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSaveProfile');
    if (!window.db) return;

    if (btn) { btn.disabled = true; btn.textContent = 'Mise à jour…'; }

    const name  = document.getElementById('editName').value.trim();
    const phone = document.getElementById('editPhone').value.trim();
    const city  = document.getElementById('editCity').value;

    try {
      const { data: { user } } = await window.db.auth.getUser();
      if (!user) { window.location.href = 'auth.html'; return; }

      const formattedPhone = typeof toE164 === 'function'
        ? toE164(phone)
        : ('+228' + phone.replace(/\D/g, ''));

      const { error } = await window.db
        .from('profiles')
        .update({ name, phone: formattedPhone, city })
        .eq('id', user.id);

      if (error) throw error;

      /* FIX Perf : mise à jour ciblée du header sans rappeler init() */
      const h2 = document.querySelector('.profile-header h2');
      const subtitle = document.querySelector('.profile-header p');
      if (h2) h2.textContent = name;
      if (subtitle) subtitle.textContent = `${city ? city + ' · ' : ''}${formattedPhone}`;

      const wrapper = document.getElementById('editProfileWrapper');
      if (wrapper) { wrapper.style.display = 'none'; wrapper.setAttribute('aria-hidden', 'true'); }

      /* FIX UX : toast à la place de alert() */
      showToast('Profil mis à jour ✨');
    } catch (err) {
      console.error(err);
      showToast('Erreur lors de la modification.');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Enregistrer les modifications'; }
    }
  }

  /* ============================================================
     Déconnexion
  ============================================================ */
  async function handleLogout() {
    if (typeof logoutUser === 'function') {
      await logoutUser();
      window.location.href = 'index.html';
    }
  }

  /* ============================================================
     Initialisation
  ============================================================ */
  async function init() {
    try {
      if (typeof getMyProfile === 'function') {
        const profile = await getMyProfile();
        profile ? renderLoggedIn(profile) : renderLoggedOut();
      } else {
        renderLoggedOut();
      }
    } catch (err) {
      console.error("Erreur lors de l'initialisation du profil :", err);
      renderLoggedOut();
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
