<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#E8732C">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="description" content="Découvrez les annonces de ce vendeur sur DEKONme — marketplace du Togo.">
  <title>Profil vendeur — DEKONme</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    .profile-page-wrapper { margin-top: 16px; padding-bottom: 40px; }
    .profile-header { animation: fadeIn 0.4s ease-out; }

    .social-links-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .social-link-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      color: #fff;
    }
    .social-link-btn.facebook  { background: #1877F2; }
    .social-link-btn.instagram { background: linear-gradient(135deg, #F58529, #DD2A7B, #8134AF); }
    .social-link-btn.tiktok    { background: #000; }

    .seller-status { font-size: 13px; margin-top: 6px; }
  </style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn back-btn" onclick="history.length > 1 ? history.back() : window.location.href='/index.html'" aria-label="Retour">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="page-title">Profil vendeur</div>
  <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>
</div>

<div class="container">
  <div id="sellerContainer" class="profile-page-wrapper">
    <p class="loading-text">Chargement du profil vendeur…</p>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>

<script src="/js/supabase-config.js"></script>
<script src="/js/app.js"></script>
<script src="/js/lazy-load.js"></script>
<script>
  const sellerId = new URLSearchParams(window.location.search).get('id');
  
  let allSellerListings = [];
  let visibleCount = 2;

  /* FIX AdSense : chargement conditionnel, uniquement quand le profil
     vendeur est réellement trouvé et affiché — jamais pendant le
     chargement ni sur "profil introuvable". */
  function loadAdSenseIfContentReady() {
    if (document.getElementById('adsbygoogle-script')) return;
    const script = document.createElement('script');
    script.id = 'adsbygoogle-script';
    script.async = true;
    script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2163275269884844';
    script.crossOrigin = 'anonymous';
    document.head.appendChild(script);
  }

  /* FIX XSS : n'autoriser que des liens http(s) absolus — bloque les
     tentatives d'injection type "javascript:alert(1)" dans un champ
     "lien Facebook" configuré par l'utilisateur. */
  function safeExternalUrl(url) {
    if (typeof url === 'string' && /^https?:\/\//i.test(url)) return url;
    return null;
  }

  /* FIX XSS : les pseudos Instagram/TikTok ne doivent contenir que des
     caractères de nom d'utilisateur valides avant d'être insérés dans une URL. */
  function safeHandle(handle) {
    if (typeof handle !== 'string') return '';
    const cleaned = handle.replace(/^@/, '').trim();
    return /^[a-zA-Z0-9_.]{1,30}$/.test(cleaned) ? cleaned : '';
  }

  function timeAgo(dateString) {
    if (!dateString) return "Membre de DEKONme";
    const months = Math.floor((Date.now() - new Date(dateString)) / (1000 * 60 * 60 * 24 * 30));
    if (months < 1) return "Membre depuis ce mois-ci";
    if (months === 1) return "Membre depuis 1 mois";
    if (months < 12) return `Membre depuis ${months} mois`;
    const years = Math.floor(months / 12);
    return `Membre depuis ${years} an${years > 1 ? 's' : ''}`;
  }

  async function init() {
    const container = document.getElementById('sellerContainer');
    if (!container) return;

    if (!sellerId) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>Profil introuvable.</p></div>`;
      if (typeof renderBottomNav === 'function') renderBottomNav('');
      return;
    }

    try {
      if (typeof getSellerProfile !== 'function' || typeof getListingsBySeller !== 'function') return;

      const profile = await getSellerProfile(sellerId);

      if (!profile) {
        container.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>Ce vendeur n'existe pas ou son profil n'est plus disponible.</p></div>`;
        if (typeof renderBottomNav === 'function') renderBottomNav('');
        return;
      }

      allSellerListings = await getListingsBySeller(sellerId) || [];

      /* FIX XSS : toutes les valeurs affichées échappées via escapeHtml() (app.js) */
      const safeName = typeof escapeHtml === 'function' ? escapeHtml(profile.name || 'Vendeur DEKONme') : String(profile.name || 'Vendeur DEKONme');
      const safeCity = typeof escapeHtml === 'function' ? escapeHtml(profile.city || '') : String(profile.city || '');
      const safeAvatar = typeof escapeHtml === 'function' ? escapeHtml(profile.avatar_emoji || '👤') : '👤';

      /* ==================== Réseaux sociaux ==================== */
      const social = profile.social_links || {};
      const fbUrl = safeExternalUrl(social.facebook);
      const igHandle = safeHandle(social.instagram);
      const ttHandle = safeHandle(social.tiktok);

      let socialHTML = '';
      if (fbUrl || igHandle || ttHandle) {
        socialHTML = `
          <div class="social-links-row" style="margin-bottom: 24px;">
            ${fbUrl ? `<a href="${escapeHtml(fbUrl)}" target="_blank" rel="noopener noreferrer" class="social-link-btn facebook">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
              Facebook
            </a>` : ''}
            ${igHandle ? `<a href="https://instagram.com/${encodeURIComponent(igHandle)}" target="_blank" rel="noopener noreferrer" class="social-link-btn instagram">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
              Instagram
            </a>` : ''}
            ${ttHandle ? `<a href="https://tiktok.com/@${encodeURIComponent(ttHandle)}" target="_blank" rel="noopener noreferrer" class="social-link-btn tiktok">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04 .79 .1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg>
              TikTok
            </a>` : ''}
          </div>
        `;
      }

      /* ==================== Status en ligne ==================== */
      let statusHTML = '';
      if (typeof getOnlineStatus === 'function') {
        const s = getOnlineStatus(profile.last_seen);
        if (s && s.dot) statusHTML = `<p class="seller-status">${escapeHtml(s.dot)} ${escapeHtml(s.label)}</p>`;
      }

      /* ==================== Notation vendeur ==================== */
      const ratingSummary = typeof getSellerRatingSummary === 'function'
        ? await getSellerRatingSummary(sellerId)
        : { average: null, count: 0 };

      const ratingBadgeHTML = ratingSummary.average !== null
        ? `<span class="seller-rating-badge">⭐ ${ratingSummary.average.toFixed(1)} · ${ratingSummary.count} avis</span>`
        : `<span class="seller-rating-badge new">Nouveau vendeur</span>`;

      const safePhone = typeof escapeHtml === 'function' ? escapeHtml(profile.phone || '') : String(profile.phone || '');

      const currentUser = typeof getCurrentUser === 'function' ? await getCurrentUser() : null;
      const isOwnProfile = currentUser && currentUser.id === sellerId;

      container.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar">${safeAvatar}</div>
          <div class="info">
            <h2>${safeName}</h2>
            <p>${safeCity ? safeCity + ' · ' : ''}${timeAgo(profile.created_at)}</p>
            ${ratingBadgeHTML}
            ${statusHTML}
          </div>
        </div>

        <!-- Bouton Contact -->
        <button type="button" onclick="contactSeller('${safePhone}')" class="btn btn-primary btn-block" style="margin: 16px 0 24px;">
          💬 Contacter via WhatsApp
        </button>

        ${socialHTML}

        <div class="section-head" style="margin-top: 32px;">
          <h3>Avis (<span id="reviewCount">${ratingSummary.count}</span>)</h3>
        </div>
        <div id="reviewsSection"></div>

        <div class="section-head" style="margin-top: 32px;">
          <h3>Annonces actives (<span id="activeCount">0</span>)</h3>
        </div>
        <div class="product-grid" id="sellerListingsGrid"></div>
        <div id="moreContainer" class="load-more-container"></div>
      `;

      renderListingsGrid();
      if (!isOwnProfile) {
        renderReviewsSection(currentUser);
      } else {
        await renderReviewsList();
      }

      /* FIX AdSense : profil réellement trouvé et affiché, on peut charger les pubs */
      loadAdSenseIfContentReady();

    } catch (error) {
      console.error("Erreur lors du chargement du profil vendeur :", error);
      container.innerHTML = `<p class="loading-text" style="color:var(--error);">Impossible de charger les données de ce vendeur.</p>`;
    }

    if (typeof renderBottomNav === 'function') renderBottomNav('');
  }

  /* ==================== Contact WhatsApp ==================== */
  function contactSeller(phone) {
    if (!phone) {
      alert("Ce vendeur n'a pas de numéro WhatsApp.");
      return;
    }
    window.open(`https://wa.me/${phone.replace(/\D/g, '')}`, '_blank');
  }

  /* ==================== SECTION AVIS ==================== */
  let _selectedStars = 0;

  async function renderReviewsSection(currentUser) {
    const section = document.getElementById('reviewsSection');
    if (!section) return;

    if (!currentUser) {
      // Non connecté : on affiche juste la liste, avec une invitation à se connecter pour noter
      await renderReviewsList();
      const list = document.getElementById('reviewsList');
      if (list) {
        const prompt = document.createElement('div');
        prompt.className = 'review-login-prompt';
        prompt.innerHTML = `<a href="/auth.html?next=seller.html">Connectez-vous</a> pour laisser un avis sur ce vendeur.`;
        section.insertBefore(prompt, list);
      }
      return;
    }

    const existingReview = typeof getMyReviewForSeller === 'function'
      ? await getMyReviewForSeller(sellerId)
      : null;

    section.innerHTML = `
      <div class="review-form-card">
        <p class="review-form-label">${existingReview ? 'Modifier votre avis' : 'Laisser un avis sur ce vendeur'}</p>
        <div class="star-picker" id="starPicker" role="radiogroup" aria-label="Note de 1 à 5 étoiles">
          ${[1,2,3,4,5].map(n => `<button type="button" class="star-btn" data-star="${n}" aria-label="${n} étoile${n>1?'s':''}">☆</button>`).join('')}
        </div>
        <textarea id="reviewComment" rows="2" placeholder="Votre expérience avec ce vendeur (facultatif)" maxlength="300">${existingReview ? escapeHtml(existingReview.comment || '') : ''}</textarea>
        <button type="button" class="btn btn-primary btn-block" id="submitReviewBtn" style="margin-top: 8px;">
          ${existingReview ? 'Mettre à jour mon avis' : 'Publier mon avis'}
        </button>
      </div>
      <div id="reviewsList"></div>
    `;

    _selectedStars = existingReview ? existingReview.rating : 0;
    updateStarDisplay();

    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        _selectedStars = Number(btn.dataset.star);
        updateStarDisplay();
      });
    });

    document.getElementById('submitReviewBtn').addEventListener('click', handleSubmitReview);

    await renderReviewsList();
  }

  function updateStarDisplay() {
    document.querySelectorAll('.star-btn').forEach(btn => {
      const n = Number(btn.dataset.star);
      btn.textContent = n <= _selectedStars ? '★' : '☆';
      btn.classList.toggle('active', n <= _selectedStars);
    });
  }

  async function handleSubmitReview() {
    if (_selectedStars === 0) {
      showToast('Choisissez une note en cliquant sur les étoiles.', 'error');
      return;
    }

    const btn = document.getElementById('submitReviewBtn');
    const comment = document.getElementById('reviewComment').value.trim();

    btn.disabled = true;
    btn.textContent = 'Envoi…';

    const result = typeof submitSellerReview === 'function'
      ? await submitSellerReview(sellerId, _selectedStars, comment, null)
      : { error: 'Fonction indisponible' };

    if (result.error) {
      showToast('Erreur : impossible d\'envoyer votre avis.', 'error');
      btn.disabled = false;
      btn.textContent = 'Publier mon avis';
      return;
    }

    showToast('✅ Merci pour votre avis !', 'success');
    init(); // recharge tout pour mettre à jour le badge de note global
  }

  function renderStars(rating) {
    const full = Math.round(rating);
    return Array.from({ length: 5 }, (_, i) => i < full ? '★' : '☆').join('');
  }

  async function renderReviewsList() {
    let list = document.getElementById('reviewsList');
    if (!list) {
      // Cas "profil connecté au vendeur lui-même" : pas de formulaire, juste la liste
      const section = document.getElementById('reviewsSection');
      if (!section) return;
      section.innerHTML = '<div id="reviewsList"></div>';
      list = document.getElementById('reviewsList');
    }

    const reviews = typeof getSellerReviews === 'function' ? await getSellerReviews(sellerId, 10) : [];

    if (!reviews.length) {
      list.innerHTML = `<p class="review-empty">Ce vendeur n'a pas encore reçu d'avis.</p>`;
      return;
    }

    list.innerHTML = reviews.map(r => {
      const author = r.profiles ? escapeHtml(r.profiles.name || 'Utilisateur DEKONme') : 'Utilisateur DEKONme';
      const avatar = r.profiles ? escapeHtml(r.profiles.avatar_emoji || '👤') : '👤';
      const date = new Date(r.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
      const comment = r.comment ? `<p class="review-comment">${escapeHtml(r.comment)}</p>` : '';
      return `
        <div class="review-item">
          <div class="review-item-header">
            <span class="review-avatar">${avatar}</span>
            <div class="review-item-meta">
              <span class="review-author">${author}</span>
              <span class="review-stars">${renderStars(r.rating)}</span>
            </div>
            <span class="review-date">${date}</span>
          </div>
          ${comment}
        </div>
      `;
    }).join('');
  }

  function safeListingImageUrl(url) {
    if (typeof url === 'string' && /^https?:\/\//i.test(url)) return url;
    return 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1"%3E%3C/svg%3E';
  }

  function renderListingsGrid() {
    const grid = document.getElementById('sellerListingsGrid');
    const btnContainer = document.getElementById('moreContainer');
    const countSpan = document.getElementById('activeCount');
    if (!grid) return;

    const activeListings = allSellerListings.filter(l => l.status !== 'sold');
    if (countSpan) countSpan.textContent = activeListings.length;

    const visibleListings = activeListings.slice(0, visibleCount);

    grid.innerHTML = activeListings.length
      ? visibleListings.map(l => {
          const rawImage = (l.images && l.images[0]) || l.image_url || 'https://picsum.photos/seed/' + encodeURIComponent(l.id) + '/600/600';
          const image = safeListingImageUrl(rawImage);
          const formattedPrice = typeof formatPrice === 'function' ? formatPrice(l.price) : l.price;
          const safeTitle = typeof escapeHtml === 'function' ? escapeHtml(l.title) : String(l.title || '');
          const safeCity = typeof escapeHtml === 'function' ? escapeHtml(l.city || '') : String(l.city || '');
          const safeCondition = typeof escapeHtml === 'function' ? escapeHtml(l.condition || '') : String(l.condition || '');
          const safeId = encodeURIComponent(l.id);
          return `
            <div class="product-card" onclick="window.location.href='/product.html?id=${safeId}'">
              <div class="img-wrap">
                <img data-src="${image}" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E" alt="${safeTitle}" class="lazy">
              </div>
              <div class="product-info">
                <h4>${safeTitle}</h4>
                <div class="price-row"><span class="price">${formattedPrice} F</span></div>
                <p class="meta">${safeCity}${safeCity && safeCondition ? ' · ' : ''}${safeCondition}</p>
              </div>
            </div>
          `;
        }).join('')
      : `<div class="empty-state" style="grid-column:1/-1; padding: 40px 20px;"><div class="emoji">📭</div><p>Ce vendeur n'a aucune annonce active pour le moment.</p></div>`;

    if (activeListings.length > visibleCount) {
      btnContainer.innerHTML = `<button class="btn btn-outline btn-sm" id="btnMoreListings">Voir plus</button>`;
    } else {
      btnContainer.innerHTML = '';
    }

    const btnMore = document.getElementById('btnMoreListings');
    if (btnMore) {
      btnMore.addEventListener('click', () => {
        visibleCount += 2;
        renderListingsGrid();
      });
    }

    if (typeof initLazyLoad === 'function') initLazyLoad();
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
